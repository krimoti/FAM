<!DOCTYPE html>

<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ארנק חכם 💰</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Rubik:wght@400;500;600;700&display=swap');

:root {
–dark:#12121F; –card:#1C1C2E; –card2:#252540;
–text:#EEEEF8; –dim:#8888AA; –border:rgba(255,255,255,.07);
–yellow:#FFD166; –orange:#FF9F43; –green:#06D6A0;
–red:#FF6B6B; –blue:#4CC9F0; –purple:#C77DFF;
–c0:#FF6B9D;–c1:#C77DFF;–c2:#4CC9F0;–c3:#06D6A0;–c4:#FFD166;–c5:#FF9F43;
–splash-duration: 3000;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:‘Rubik’,sans-serif;background:var(–dark);color:var(–text);}

/* ══ BG ══ */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg span{position:absolute;border-radius:50%;opacity:.04;animation:fl 10s ease-in-out infinite;}
.bg span:nth-child(1){width:400px;height:400px;background:#FF6B9D;top:-100px;right:-120px;}
.bg span:nth-child(2){width:280px;height:280px;background:#C77DFF;bottom:40px;left:-90px;animation-delay:3s;}
.bg span:nth-child(3){width:200px;height:200px;background:#4CC9F0;top:40%;left:40%;animation-delay:6s;}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}

/* ══ SCREENS ══ */
.screen{position:fixed;inset:0;z-index:1;display:none;flex-direction:column;overflow-y:auto;overflow-x:hidden;}
.screen.active{display:flex;}

/* ══════════════════════════════════════
SPLASH
══════════════════════════════════════ */
#splash{
z-index:999;background:var(–dark);
align-items:center;justify-content:center;flex-direction:column;gap:0;
overflow:hidden;
}
.splash-coins{position:absolute;inset:0;pointer-events:none;}
.coin{
position:absolute;font-size:2rem;opacity:0;
animation:coinFall linear forwards;
}
@keyframes coinFall{
0%  {transform:translateY(-60px) rotate(0deg);opacity:1;}
80% {opacity:1;}
100%{transform:translateY(110vh) rotate(720deg);opacity:0;}
}
.splash-logo{
font-family:‘Fredoka One’;font-size:4rem;color:var(–yellow);
text-shadow:0 0 60px rgba(255,209,102,.5);
opacity:0;animation:splashIn .8s .3s cubic-bezier(.34,1.3,.64,1) forwards;
text-align:center;z-index:2;
}
.splash-sub{
font-size:1.1rem;color:var(–dim);margin-top:8px;
opacity:0;animation:splashIn .8s .7s cubic-bezier(.34,1.3,.64,1) forwards;
text-align:center;z-index:2;
}
.splash-bar-wrap{
width:160px;height:4px;background:rgba(255,255,255,.08);border-radius:99px;
margin-top:30px;z-index:2;overflow:hidden;
opacity:0;animation:splashIn .6s 1s ease forwards;
}
.splash-bar-fill{
height:100%;background:var(–yellow);border-radius:99px;
width:0%;animation:splashBar linear 1s forwards;
animation-delay:1.1s;
}
@keyframes splashIn{to{opacity:1;}}
@keyframes splashBar{to{width:100%;}}
@keyframes splashOut{to{opacity:0;transform:scale(1.05);}}

/* ══════════════════════════════════════
LOGIN
══════════════════════════════════════ */
#login{align-items:center;justify-content:center;padding:40px 24px;gap:20px;}
.login-logo{font-family:‘Fredoka One’;font-size:2.2rem;color:var(–yellow);text-align:center;}
.login-users{display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px;}
.login-card{
background:var(–card);border-radius:18px;padding:16px 20px;
display:flex;align-items:center;gap:14px;cursor:pointer;
border:2px solid transparent;transition:all .18s;
}
.login-card:active{transform:scale(.97);}
.login-card .lc-av{font-size:2.2rem;}
.login-card .lc-av img{width:44px;height:44px;border-radius:50%;object-fit:cover;}
.login-card .lc-name{font-weight:700;font-size:1rem;}
.login-card .lc-hint{font-size:.78rem;color:var(–dim);margin-top:2px;}
.login-pin-wrap{
width:100%;max-width:340px;background:var(–card);border-radius:20px;padding:20px;
display:none;flex-direction:column;align-items:center;gap:14px;
}
.login-pin-wrap.show{display:flex;}
.pin-who{font-family:‘Fredoka One’;font-size:1.5rem;}
.pin-dots{display:flex;gap:12px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(–dim);transition:all .14s;}
.pin-dot.on{background:var(–yellow);border-color:var(–yellow);transform:scale(1.2);}
.pin-err{color:var(–red);font-size:.84rem;height:16px;}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;width:100%;}
.kk{background:var(–card2);border:none;border-radius:13px;padding:15px;font-size:1.25rem;font-weight:700;color:var(–text);cursor:pointer;font-family:‘Rubik’;transition:background .1s,transform .1s;}
.kk:active{transform:scale(.9);}
.kk.del{font-size:.88rem;color:var(–dim);}
.kk.emp{background:transparent;cursor:default;pointer-events:none;}
.btn-back{background:none;border:1px solid rgba(255,255,255,.12);color:var(–dim);padding:8px 20px;border-radius:10px;cursor:pointer;font-family:‘Rubik’;font-size:.84rem;}

/* ══════════════════════════════════════
CAROUSEL WRAPPER
══════════════════════════════════════ */
.carousel-outer{
position:fixed;inset:0;z-index:1;display:none;
flex-direction:column;
}
.carousel-outer.active{display:flex;}

/* top bar */
.top-bar{
padding:50px 18px 14px;display:flex;align-items:center;gap:10px;
flex-shrink:0;position:relative;z-index:10;
}
.top-bar .tav{font-size:2rem;cursor:pointer;}
.top-bar .tav img{width:44px;height:44px;border-radius:50%;object-fit:cover;}
.top-bar .tname{font-family:‘Fredoka One’;font-size:1.3rem;flex:1;}
.top-bar .tsync{font-size:.68rem;color:var(–green);display:flex;align-items:center;gap:4px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(–green);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.top-bar .tlogout{background:rgba(255,255,255,.06);border:none;border-radius:9px;padding:7px 11px;color:var(–dim);cursor:pointer;font-size:.78rem;font-family:‘Rubik’;}

/* slides container */
.slides-track{
flex:1;display:flex;overflow:hidden;position:relative;
}
.slide{
min-width:100%;height:100%;overflow-y:auto;overflow-x:hidden;
padding-bottom:80px;transition:none;
-webkit-overflow-scrolling:touch;
}

/* swipe indicator dots */
.swipe-dots{
position:absolute;bottom:68px;left:0;right:0;
display:flex;justify-content:center;gap:6px;z-index:10;pointer-events:none;
}
.sdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .25s;}
.sdot.active{width:20px;background:var(–yellow);}

/* tab bar */
.tab-bar{
position:absolute;bottom:0;left:0;right:0;
background:rgba(18,18,31,.96);backdrop-filter:blur(16px);
border-top:1px solid var(–border);
display:flex;padding:8px 4px 20px;z-index:20;
}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:5px 3px;border-radius:10px;}
.tab .ti{font-size:1.25rem;}
.tab .tl{font-size:.62rem;color:var(–dim);transition:color .15s;}
.tab.active .tl{color:var(–yellow);}
.tab.active .ti{animation:tabPop .25s cubic-bezier(.34,1.5,.64,1);}
@keyframes tabPop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.tnotif{position:absolute;top:3px;right:4px;background:var(–red);color:#fff;border-radius:50%;width:14px;height:14px;font-size:.58rem;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* ══════════════════════════════════════
COMMON COMPONENTS
══════════════════════════════════════ */
.sec-pad{padding:14px 16px 0;}
.sec-ttl{font-size:.78rem;color:var(–dim);margin-bottom:10px;letter-spacing:.05em;font-weight:600;}
.card-block{background:var(–card);border-radius:18px;padding:16px;margin-bottom:12px;}
.card-block h4{font-size:.86rem;font-weight:700;color:var(–dim);margin-bottom:12px;}
.arow{display:flex;gap:7px;align-items:flex-end;}
.iw{flex:1;}
.iw label{display:block;font-size:.7rem;color:var(–dim);margin-bottom:3px;}
.iw input,.iw select,.iw textarea{
width:100%;background:var(–dark);border:1.5px solid rgba(255,255,255,.08);
border-radius:10px;padding:9px 11px;color:var(–text);
font-family:‘Rubik’;font-size:.88rem;transition:border-color .2s;
}
.iw input:focus,.iw select:focus,.iw textarea:focus{outline:none;border-color:var(–yellow);}
.iw textarea{resize:none;height:56px;}
.btn-g,.btn-r,.btn-y,.btn-p,.btn-b,.btn-o{
border:none;border-radius:10px;padding:10px 13px;
font-family:‘Fredoka One’;font-size:.88rem;cursor:pointer;
transition:transform .1s,box-shadow .15s;white-space:nowrap;
}
.btn-g{background:var(–green);color:#0A0A1A;}
.btn-r{background:var(–red);color:#fff;}
.btn-y{background:var(–yellow);color:#1A1A2E;}
.btn-p{background:var(–purple);color:#0A0A1A;}
.btn-b{background:var(–blue);color:#0A0A1A;}
.btn-o{background:var(–orange);color:#1A1A2E;}
.btn-g:active,.btn-r:active,.btn-y:active,.btn-p:active,.btn-b:active,.btn-o:active{transform:scale(.93);}
.btn-full{width:100%;display:block;text-align:center;padding:13px;}
.divider{height:1px;background:var(–border);margin:8px 0;}
.empty-state{color:var(–dim);text-align:center;padding:28px 16px;font-size:.84rem;}

/* ══ BALANCE CARD ══ */
.bal-card{
margin:0 16px 12px;padding:26px 20px;border-radius:22px;
background:linear-gradient(135deg,var(–card),var(–card2));
text-align:center;
}
.bal-label{font-size:.84rem;color:var(–dim);margin-bottom:6px;}
.bal-amount{font-family:‘Fredoka One’;line-height:1;margin-bottom:5px;}
.bal-upd{font-size:.74rem;color:var(–dim);}
.bal-em{font-size:1.5rem;margin-top:5px;display:block;}

/* ══ GOAL BAR ══ */
.goal-bar-wrap{background:var(–card);border-radius:16px;padding:14px;margin:0 16px 12px;}
.goal-bar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.goal-title{font-size:.86rem;font-weight:700;}
.goal-pct{font-size:.8rem;color:var(–dim);}
.goal-track{height:9px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;}
.goal-fill{height:100%;border-radius:99px;transition:width .7s cubic-bezier(.34,1.3,.64,1);}
.goal-amounts{display:flex;justify-content:space-between;margin-top:5px;font-size:.72rem;color:var(–dim);}
.goal-funny{text-align:center;margin-top:8px;font-size:.82rem;line-height:1.45;}

/* ══ SAVINGS CARD ══ */
.sav-card{
margin:0 16px 12px;padding:16px;border-radius:18px;
background:linear-gradient(135deg,rgba(6,214,160,.1),rgba(6,214,160,.04));
border:1px solid rgba(6,214,160,.2);
}
.sav-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
.sav-cell{background:rgba(255,255,255,.04);border-radius:11px;padding:9px;text-align:center;}
.sav-cell .sc-label{font-size:.68rem;color:var(–dim);margin-bottom:2px;}
.sav-cell .sc-val{font-size:1.05rem;font-weight:700;}

/* ══ TX LIST ══ */
.tx{background:var(–card);border-radius:13px;padding:12px;margin-bottom:7px;display:flex;align-items:center;gap:10px;}
.tx-ic{font-size:1.2rem;}
.tx-body{flex:1;}
.tx-note{font-size:.88rem;font-weight:600;}
.tx-date{font-size:.72rem;color:var(–dim);margin-top:1px;}
.tx-amt{font-size:.98rem;font-weight:700;}
.tx-amt.pos{color:var(–green);}
.tx-amt.neg{color:var(–red);}
.tx-amt.sav{color:#4CC9F0;}

/* ══ TASKS ══ */
.task-card{background:var(–card);border-radius:13px;padding:12px;margin-bottom:7px;display:flex;align-items:center;gap:10px;}
.task-emoji{font-size:1.4rem;}
.task-body{flex:1;}
.task-name{font-size:.88rem;font-weight:600;}
.task-bonus{font-size:.76rem;color:var(–green);margin-top:1px;}
.task-status.done-wait{color:var(–orange);font-size:.74rem;margin-top:2px;}
.task-status.approved{color:var(–green);font-size:.74rem;margin-top:2px;}
.btn-task-done{background:rgba(6,214,160,.12);border:1px solid rgba(6,214,160,.3);color:var(–green);border-radius:9px;padding:6px 11px;font-family:‘Rubik’;font-size:.76rem;cursor:pointer;font-weight:600;white-space:nowrap;}

/* ══ REQUESTS ══ */
.req-item{background:var(–card);border-radius:13px;padding:12px;margin-bottom:7px;}
.req-top{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.req-name{font-size:.88rem;font-weight:600;flex:1;}
.req-amt{font-size:.84rem;color:var(–yellow);font-weight:700;}
.req-note{font-size:.76rem;color:var(–dim);}
.req-badge{font-size:.7rem;padding:2px 8px;border-radius:99px;font-weight:700;}
.req-badge.waiting{background:rgba(255,209,102,.15);color:var(–yellow);}
.req-badge.approved{background:rgba(6,214,160,.15);color:var(–green);}
.req-badge.rejected{background:rgba(255,107,107,.15);color:var(–red);}

/* ══ DESIGN TAB ══ */
.theme-swatch{width:42px;height:42px;border-radius:13px;cursor:pointer;position:relative;overflow:hidden;transition:all .2s;}

/* ══ MINI HIST ══ */
.mtx{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:.79rem;}
.mtx:last-child{border:none;}
.mtx .mn{flex:1;color:var(–dim);}
.mtx .ma{font-weight:700;}
.mtx .ma.pos{color:var(–green);}
.mtx .ma.neg{color:var(–red);}
.mtx .ma.set{color:var(–yellow);}
.mtx .ma.sav{color:#4CC9F0;}
.mtx .md{font-size:.68rem;color:rgba(255,255,255,.2);}

/* ══ DAD KID SELECTOR ══ */
.kid-select{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;}
.ks-btn{background:var(–card);border:2px solid transparent;border-radius:11px;padding:7px 13px;cursor:pointer;font-family:‘Rubik’;font-size:.82rem;color:var(–dim);transition:all .14s;}
.ks-btn.active{color:var(–text);font-weight:700;}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(120px);background:var(–green);color:#0A0A1A;padding:10px 20px;border-radius:50px;font-weight:700;font-size:.84rem;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:9999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{background:var(–red);color:#fff;}
.toast.info{background:var(–blue);color:#0A0A1A;}

/* ══ MODAL ══ */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:5000;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(–card);border-radius:24px 24px 0 0;padding:24px 20px 36px;width:100%;max-width:460px;animation:slideUp .26s cubic-bezier(.34,1.3,.64,1);max-height:86vh;overflow-y:auto;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h3{font-family:‘Fredoka One’;font-size:1.25rem;margin-bottom:14px;}
.mfield{margin-bottom:11px;}
.mfield label{display:block;font-size:.72rem;color:var(–dim);margin-bottom:3px;}
.mfield input,.mfield select{width:100%;background:var(–dark);border:1.5px solid rgba(255,255,255,.08);border-radius:10px;padding:9px 11px;color:var(–text);font-family:‘Rubik’;font-size:.88rem;}
.mfield input:focus,.mfield select:focus{outline:none;border-color:var(–yellow);}
.mbtns{display:flex;gap:8px;margin-top:8px;}
.mbtns button{flex:1;border:none;border-radius:10px;padding:11px;font-family:‘Fredoka One’;font-size:.9rem;cursor:pointer;}
.mbtns .msave{background:var(–yellow);color:var(–dark);}
.mbtns .mcancel{background:rgba(255,255,255,.07);color:var(–text);}
.mdel{width:100%;border:none;border-radius:10px;padding:10px;background:rgba(255,107,107,.1);color:var(–red);font-family:‘Fredoka One’;font-size:.88rem;cursor:pointer;margin-top:7px;}
.gear{position:fixed;top:14px;right:13px;z-index:200;background:rgba(255,255,255,.06);border:none;border-radius:10px;padding:8px 10px;cursor:pointer;font-size:1rem;}

/* ══ SPIN ══ */
.spin{width:44px;height:44px;border:3px solid rgba(255,209,102,.2);border-top-color:var(–yellow);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
</style>

</head>
<body>
<div class="bg"><span></span><span></span><span></span></div>
<div class="toast" id="toast"></div>

<!-- ══ SPLASH ══ -->

<div class="screen active" id="splash">
  <div class="splash-coins" id="splash-coins"></div>
  <div class="splash-logo" id="splash-title">💰 ארנק חכם</div>
  <div class="splash-sub" id="splash-sub">המשפחה שלנו</div>
  <div class="splash-bar-wrap"><div class="splash-bar-fill" id="splash-bar"></div></div>
</div>

<!-- ══ LOADING ══ -->

<div class="screen" id="loading" style="align-items:center;justify-content:center;gap:12px">
  <div class="spin"></div>
  <div style="color:var(--dim);font-size:.9rem" id="load-txt">מתחבר לענן...</div>
</div>

<!-- ══ LOGIN ══ -->

<div class="screen" id="login">
  <div class="login-logo">💰 ארנק חכם<br><span style="font-size:1rem;font-family:Rubik;color:var(--dim)">מי את/ה?</span></div>
  <div class="login-users" id="login-users"></div>
  <div class="login-pin-wrap" id="login-pin">
    <div class="pin-who" id="lpin-who"></div>
    <div class="pin-dots">
      <div class="pin-dot" id="lpd0"></div><div class="pin-dot" id="lpd1"></div>
      <div class="pin-dot" id="lpd2"></div><div class="pin-dot" id="lpd3"></div>
    </div>
    <div class="pin-err" id="lpin-err"></div>
    <div class="keypad">
      <button class="kk" onclick="pk('1')">1</button><button class="kk" onclick="pk('2')">2</button><button class="kk" onclick="pk('3')">3</button>
      <button class="kk" onclick="pk('4')">4</button><button class="kk" onclick="pk('5')">5</button><button class="kk" onclick="pk('6')">6</button>
      <button class="kk" onclick="pk('7')">7</button><button class="kk" onclick="pk('8')">8</button><button class="kk" onclick="pk('9')">9</button>
      <div class="kk emp"></div><button class="kk" onclick="pk('0')">0</button><button class="kk del" onclick="pdel()">⌫</button>
    </div>
    <button class="btn-back" onclick="cancelPin()">← חזרה</button>
  </div>
</div>

<!-- ══ CAROUSEL (child) ══ -->

<div class="carousel-outer" id="child-carousel">
  <div class="top-bar">
    <div class="tav" id="cav"></div>
    <div>
      <div class="tname" id="cname"></div>
      <div class="tsync"><span class="sync-dot"></span> מסונכרן</div>
    </div>
    <button class="tlogout" onclick="logout()">יציאה</button>
  </div>
  <div class="slides-track" id="child-track">
    <!-- slides injected by JS -->
  </div>
  <div class="swipe-dots" id="child-dots"></div>
  <div class="tab-bar" id="child-tabs"></div>
</div>

<!-- ══ CAROUSEL (dad) ══ -->

<div class="carousel-outer" id="dad-carousel">
  <div class="top-bar">
    <div class="tav" id="dav"></div>
    <div>
      <div class="tname" id="dname"></div>
      <div style="font-size:.72rem;color:var(--dim)">לוח ניהול</div>
    </div>
    <button onclick="doBackup()" style="background:rgba(255,255,255,.06);border:none;border-radius:9px;padding:6px 10px;color:var(--dim);cursor:pointer;font-family:'Rubik';font-size:.76rem;margin-left:6px">💾</button>
    <button class="tlogout" onclick="logout()">יציאה</button>
  </div>
  <div class="slides-track" id="dad-track"></div>
  <div class="swipe-dots" id="dad-dots"></div>
  <div class="tab-bar" id="dad-tabs"></div>
</div>

<!-- ══ MODALS ══ -->

<div class="overlay" id="kid-modal">
  <div class="modal">
    <h3 id="km-title">➕ הוסף ילד/ה</h3>
    <div class="mfield"><label>שם</label><input id="km-name" maxlength="14"></div>
    <div class="mfield"><label>אימוג'י</label><input id="km-emoji" maxlength="4" placeholder="👧"></div>

// ── LOAD ──
async function loadAll() {
  const snap = await getDoc(cfgRef());
  if (snap.exists()) {
    D.dad  = {...D.dad, ...snap.data().dad};
    D.kids = snap.data().kids || [];
  } else {
    await setDoc(cfgRef(),{dad:D.dad,kids:[]});
  }
  for (const k of D.kids) {
    const ks = await getDoc(kidRef(k.id));
    if (ks.exists()) Object.assign(k, ks.data());
    else await setDoc(kidRef(k.id),{balance:0,savings:0,savingsRate:3.9,lastSavingsMonth:'',history:[],message:'',goal:null,graphData:[],avatar:'',themeIdx:0,fontIdx:4});
    const ts = await getDoc(taskRef(k.id));
    k.tasks = ts.exists() ? (ts.data().tasks||[]) : [];
    const rs = await getDoc(reqRef(k.id));
    k.requests = rs.exists() ? (rs.data().requests||[]) : [];
  }
}

function applyTheme(themeIdx, fontIdx){

  r.style.setProperty('--dark',t.bg);
  r.style.setProperty('--card',t.card);
  r.style.setProperty('--card2',t.card2);
  r.style.setProperty('--text',t.text);
  r.style.setProperty('--dim',t.dim);
  r.style.setProperty('--yellow',t.accent);
  r.style.setProperty('--green',t.accent);
  r.style.setProperty('--blue',t.accent);
  r.style.setProperty('--purple',t.accent);
  r.style.setProperty('--orange',t.accent);
  r.style.setProperty('--border',t.bg.startsWith('#F')||t.bg.startsWith('#E')?'rgba(0,0,0,.08)':'rgba(255,255,255,.07)');

  document.body.style.color=t.text;
  r.style.fontSize=f.base;

// ══════════════════════════════════════
// CAROUSEL ENGINE
// ══════════════════════════════════════
function buildCarousel(containerId, trackId, tabsId, dotsId, tabs, renderFns){
  const track=document.getElementById(trackId);
  const tabBar=document.getElementById(tabsId);
  const dotsEl=document.getElementById(dotsId);
  track.innerHTML=''; tabBar.innerHTML=''; dotsEl.innerHTML='';

  tabs.forEach((t,i)=>{
    const slide=document.createElement('div');
    slide.className='slide';
    slide.id=trackId+'-slide-'+i;
    track.appendChild(slide);

    const tab=document.createElement('div');
    tab.className='tab'+(i===0?' active':'');
    tab.style.position='relative';
    tab.innerHTML=`<span class="ti">${t.icon}</span><span class="tl">${t.label}</span>`;
    if(t.badge) tab.innerHTML+=`<div class="tnotif" id="badge-${t.badge}"></div>`;
    tab.onclick=()=>goSlide(trackId,tabsId,dotsId,i,renderFns);
    tabBar.appendChild(tab);

    const dot=document.createElement('div');
    dot.className='sdot'+(i===0?' active':'');
    dotsEl.appendChild(dot);
  });

  // swipe
  track.addEventListener('touchstart',e=>{ touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; },{passive:true});
  track.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-touchStartX;
    const dy=e.changedTouches[0].clientY-touchStartY;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){
      const cur=trackId==='child-track'?childSlideIdx:dadSlideIdx;
      const next=dx<0?Math.min(cur+1,tabs.length-1):Math.max(cur-1,0);
      if(next!==cur) goSlide(trackId,tabsId,dotsId,next,renderFns);
    }
  },{passive:true});

  renderFns[0](document.getElementById(trackId+'-slide-0'));
}

function goSlide(trackId,tabsId,dotsId,idx,renderFns){
  if(trackId==='child-track') childSlideIdx=idx;
  else dadSlideIdx=idx;

  const track=document.getElementById(trackId);
  track.style.transition='transform .3s cubic-bezier(.4,0,.2,1)';
  track.style.transform=`translateX(${idx*100}%)`;
  // RTL: mirror
  const slides=track.querySelectorAll('.slide');
  track.style.transform=`translateX(${-idx * (100/slides.length)}%)`;
  // simpler: move each slide
  slides.forEach((s,i)=>{
    s.style.transform=`translateX(${(i-idx)*100}%)`;
  });

  document.querySelectorAll('#'+tabsId+' .tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('#'+dotsId+' .sdot').forEach((d,i)=>d.classList.toggle('active',i===idx));

  const slide=document.getElementById(trackId+'-slide-'+idx);
  renderFns[idx](slide);
}

// position slides initially
function initSlides(trackId){
  const slides=document.getElementById(trackId).querySelectorAll('.slide');
  slides.forEach((s,i)=>{ s.style.position='absolute'; s.style.top='0'; s.style.left='0'; s.style.width='100%'; });
  slides.forEach((s,i)=>{ s.style.transform=`translateX(${i*100}%)`; });
}

function openChild(kidId){
  const k=D.kids.find(x=>x.id===kidId);
  applyTheme(k.themeIdx??0, k.fontIdx??4);
  checkAutoInterest(k);

  // header
  const cav=document.getElementById('cav');
  cav.innerHTML=k.avatar?`<img src="${k.avatar}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid ${kidColor(k)}">`:`<span>${k.emoji}</span>`;
  cav.onclick=()=>goSlide('child-track','child-tabs','child-dots',5,childRenderFns);
  document.getElementById('cname').textContent=k.name;
  document.getElementById('gear').style.display='none';

  childSlideIdx=0;
  const tabs=[
    {icon:'🏠',label:'בית'},
    {icon:'📈',label:'חיסכון'},
    {icon:'🎯',label:'יעד'},
    {icon:'✅',label:'משימות'},
    {icon:'💌',label:'בקשות',badge:'child-req-badge'},
    {icon:'🎨',label:'עיצוב'},
  ];

  window.childRenderFns=[
    (el)=>renderChildHome(el,k),
    (el)=>renderChildSavings(el,k),
    (el)=>renderChildGoal(el,k),
    (el)=>renderChildTasks(el,k),
    (el)=>renderChildRequests(el,k),
    (el)=>renderChildDesign(el,k),
  ];

  buildCarousel('child-carousel','child-track','child-tabs','child-dots',tabs,childRenderFns);
  initSlides('child-track');
  show('child-carousel');

  // live listeners
  unsubs.push(onSnapshot(kidRef(kidId),snap=>{
    if(!snap.exists())return;
    Object.assign(k,snap.data());
    checkAutoInterest(k);
    const cur=childSlideIdx;
    childRenderFns[cur](document.getElementById('child-track-slide-'+cur));
  }));
  unsubs.push(onSnapshot(taskRef(kidId),snap=>{ if(snap.exists()){ k.tasks=snap.data().tasks||[]; updateChildBadge(k); } }));
  unsubs.push(onSnapshot(reqRef(kidId), snap=>{ if(snap.exists()){ k.requests=snap.data().requests||[]; updateChildBadge(k); } }));
}

function updateChildBadge(k){
  const el=document.getElementById('badge-child-req-badge');

  const n=(k.requests||[]).filter(r=>r.status==='approved'||r.status==='rejected').length;
  el.textContent=n||''; el.style.display=n?'flex':'none';
}

  const auto=autoMsg(bal,k.name);
  const personal=(k.message||'').trim();
  const msgs=(personal?`<div style="background:linear-gradient(135deg,rgba(255,209,102,.13),rgba(255,159,67,.07));border:1px solid rgba(255,209,102,.28);border-radius:13px;padding:11px 13px;font-size:.84rem;display:flex;gap:8px;color:var(--yellow);font-weight:600;margin:0 16px 8px"><span>💌</span><span>${personal}</span></div>`:'')+
             (auto?`<div style="background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:13px;padding:11px 13px;font-size:.84rem;display:flex;gap:8px;color:var(--dim);margin:0 16px 8px"><span>${auto.i}</span><span>${auto.t}</span></div>`:'');

  el.innerHTML=`

window.previewFont=(prefix,val)=>{
  const f=FONT_SIZES[parseInt(val)];
  const el=document.getElementById(prefix+'-fp-'+prefix.split('-')[1]||'dm-font-prev');
  // try both ids
  const el2=document.getElementById('cv-fp-'+prefix.replace('cv-',''));
  const el3=document.getElementById('dm-font-prev');
  if(el2){el2.style.fontSize=f.base;el2.textContent=`גודל ${f.name} — ₪123.45`;}
  if(el3&&prefix==='dm'){el3.style.fontSize=f.base;el3.textContent=`גודל ${f.name} — ₪123.45`;}

window.saveChildAvatar=async(kidId,e)=>{
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const img=new Image();
    img.onload=async()=>{
      const canvas=document.createElement('canvas');
      const max=200; let w=img.width,h=img.height;
      if(w>h){if(w>max){h=h*max/w;w=max;}}else{if(h>max){w=w*max/h;h=max;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const k=D.kids.find(x=>x.id===kidId);
      if(!k)return;
      k.avatar=canvas.toDataURL('image/jpeg',0.7);
      await saveKidData(k);
      renderChildDesign(document.getElementById('child-track-slide-5'),k);
      const cav=document.getElementById('cav');
      cav.innerHTML=`<img src="${k.avatar}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid ${kidColor(k)}">`;
      toast('📸 תמונה עודכנה!');
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
};

// money ops
function nowStr(){const d=new Date();return d.toLocaleDateString('he-IL')+' '+d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});}
function addGraphPt(k){k.graphData=k.graphData||[];k.graphData.push({date:new Date().toLocaleDateString('he-IL'),balance:k.balance||0});if(k.graphData.length>30)k.graphData=k.graphData.slice(-30);}

window.addM=async(id)=>{
  const amt=parseFloat(document.getElementById('amt-'+id)?.value);
  const note=document.getElementById('note-'+id)?.value.trim()||'';
  if(!amt||amt<=0){toast('הכנס סכום',true);return;}
  const k=D.kids.find(x=>x.id===id);
  k.balance=Math.round(((k.balance||0)+amt)*100)/100;
  k.history=[{type:'add',amount:amt,note:note||'הפקדה',date:nowStr()},...(k.history||[])].slice(0,60);
  addGraphPt(k); await saveKidData(k); toast(`✅ +₪${amt.toFixed(2)} ל${k.name}`);
  document.getElementById('amt-'+id).value=''; document.getElementById('note-'+id).value='';
};
window.subM=async(id)=>{
  const amt=parseFloat(document.getElementById('amt-'+id)?.value);
  const note=document.getElementById('note-'+id)?.value.trim()||'';
  if(!amt||amt<=0){toast('הכנס סכום',true);return;}
  const k=D.kids.find(x=>x.id===id);
  if(amt>(k.balance||0)){toast('יתרה לא מספיקה',true);return;}
  k.balance=Math.round(((k.balance||0)-amt)*100)/100;
  k.history=[{type:'sub',amount:amt,note:note||'משיכה',date:nowStr()},...(k.history||[])].slice(0,60);
  addGraphPt(k); await saveKidData(k); toast(`✅ -₪${amt.toFixed(2)} מ${k.name}`);
  document.getElementById('amt-'+id).value=''; document.getElementById('note-'+id).value='';
};
window.setB=async(id)=>{
  const val=parseFloat(document.getElementById('set-'+id)?.value);
  if(isNaN(val)||val<0){toast('יתרה לא תקינה',true);return;}
  const k=D.kids.find(x=>x.id===id);
  const old=k.balance||0;
  k.balance=Math.round(val*100)/100;
  k.history=[{type:'set',amount:val,note:`עדכון ₪${old.toFixed(2)}→₪${val.toFixed(2)}`,date:nowStr()},...(k.history||[])].slice(0,60);
  addGraphPt(k); await saveKidData(k); toast(`✅ יתרה עודכנה`);
  document.getElementById('set-'+id).value='';
};
window.saveMsg=async(id)=>{
  const msg=document.getElementById('msg-'+id)?.value.trim()||'';
  const k=D.kids.find(x=>x.id===id); k.message=msg; await saveKidData(k);
  toast(msg?'💌 הודעה נשמרה':'🗑️ הודעה נמחקה');
};
window.addSavings=async(id)=>{
  const amt=parseFloat(document.getElementById('sav-'+id)?.value);
  if(!amt||amt<=0){toast('הכנס סכום',true);return;}
  const k=D.kids.find(x=>x.id===id);
  k.savings=(k.savings||0)+amt;
  k.history=[{type:'savings',amount:amt,note:'הפקדה לחיסכון',date:nowStr(),protected:true},...(k.history||[])].slice(0,60);
  await saveKidData(k); toast(`🏦 +₪${amt.toFixed(2)} לחיסכון`);
  document.getElementById('sav-'+id).value='';
};
window.saveSavingsRate=async(id)=>{
  const rate=parseFloat(document.getElementById('rate-'+id)?.value);
  if(isNaN(rate)||rate<0||rate>100){toast('ריבית לא תקינה',true);return;}
  const k=D.kids.find(x=>x.id===id); k.savingsRate=rate; await saveKidData(k);
  toast(`✅ ריבית ${rate}%`);
};
window.clearHistory=async(id)=>{
  const range=document.getElementById('hrange-'+id)?.value||'all';
  const k=D.kids.find(x=>x.id===id);
  if(!k||!confirm(`מחק היסטוריה (${range==='week'?'שבוע':range==='month'?'חודש':'הכל'})?`))return;
  if(range==='all'){ k.history=(k.history||[]).filter(tx=>tx.protected); }
  else {
    const days=range==='week'?7:30;
    const cutoff=Date.now()-days*24*60*60*1000;
    k.history=(k.history||[]).filter(tx=>{
      if(tx.protected)return true;
      try{const p=tx.date.split(' ')[0].split('.');return new Date(+p[2],+p[1]-1,+p[0]).getTime()>cutoff;}
      catch{return false;}
    });
  }
  await saveKidData(k); toast('🗑️ נמחק');
};

// auto interest
function checkAutoInterest(k){
  if(!k.savings||k.savings<=0)return;
  const now=new Date();
  const monthKey=`${now.getFullYear()}-${now.getMonth()}`;
  if(k.lastSavingsMonth===monthKey)return;
  const rate=(k.savingsRate??3.9)/100;
  const interest=Math.round(k.savings*rate/12*100)/100;
  if(interest<=0)return;
  k.savings=Math.round((k.savings+interest)*100)/100;
  k.lastSavingsMonth=monthKey;
  k.history=[{type:'savings',amount:interest,note:`ריבית חודשית (${k.savingsRate??3.9}%)`,date:nowStr(),protected:true},...(k.history||[])].slice(0,60);
  saveKidData(k);
}

window.addTask=async()=>{

  const k=D.kids.find(x=>x.id===kidId);
  k.tasks=[...(k.tasks||[]),{id:'t'+Date.now(),name,bonus,emoji,status:'active',active:true}];

  document.getElementById('tnm').value=''; document.getElementById('tbonus').value=''; document.getElementById('temoji').value='';

window.approveTask=async(kidId,taskId)=>{
  const k=D.kids.find(x=>x.id===kidId);
  const t=k.tasks.find(x=>x.id===taskId); if(!t)return;
  t.status='approved';
  k.balance=Math.round(((k.balance||0)+t.bonus)*100)/100;
  k.history=[{type:'bonus',amount:t.bonus,note:`בונוס: ${t.name}`,date:nowStr()},...(k.history||[])].slice(0,60);
  addGraphPt(k); await saveKidData(k); await saveKidTasks(k);
  toast(`🏅 בונוס ₪${t.bonus} נוסף!`); renderTasksList();
};
window.rejectTask=async(kidId,taskId)=>{
  const k=D.kids.find(x=>x.id===kidId);
  const t=k.tasks.find(x=>x.id===taskId); if(!t)return;
  t.status='active'; await saveKidTasks(k); toast('↩️ הוחזר'); renderTasksList();
};
window.delTask=async(kidId,taskId)=>{
  const k=D.kids.find(x=>x.id===kidId);
  k.tasks=k.tasks.filter(x=>x.id!==taskId); await saveKidTasks(k); toast('🗑️ נמחק'); renderTasksList();
};

  return styles[Math.floor(Math.random()*styles.length)];
}
function autoMsg(bal,name){
  if(bal===0)return{i:'🌱',t:`${name}, הכל מתחיל בשקל הראשון!`};
  if(bal<20) return{i:'💪',t:`₪${bal.toFixed(2)} — יפה! תמשיכי לצבור!`};
  if(bal<50) return{i:'⭐',t:`₪${bal.toFixed(2)} — בדרך הנכונה!`};
  if(bal<100)return{i:'🚀',t:`כבר ₪${bal.toFixed(2)}! קרוב ל-100!`};
  if(bal<200)return{i:'🎉',t:`₪${bal.toFixed(2)} — מאה ומעלה!`};
  if(bal<500)return{i:'👑',t:`₪${bal.toFixed(2)} — חוסכת כמו אלופה!`};
  return{i:'🏆',t:`₪${bal.toFixed(2)} — חסכנית אמיתית!`};
}
function getSavingsRecs(k){
  const recs=[];
  const savings=k.savings||0;
  const rate=(k.savingsRate??3.9)/100;
  const monthly=savings*rate/12;
  if(savings<500)recs.push('🌱 כשתגיעי ל-₪500 הריבית תתחיל להיות מורגשת!');
  if(savings>=500&&savings<2000)recs.push(`📈 כל ₪100 שמוסיפים = עוד ₪${((100*rate/12).toFixed(2))} ריבית לחודש!`);
  if(savings>=2000)recs.push('🏆 חיסכון מרשים! שקלי להגדיל ב-10%');
  if(monthly>0)recs.push(`💰 הכסף עובד! החודש: +₪${monthly.toFixed(2)} ריבית 🎉`);
  if(k.goal&&k.goal.target>(k.balance||0)){
    const needed=k.goal.target-(k.balance||0);
    const months=monthly>0?Math.ceil(needed/monthly):999;
    if(months<999)recs.push(`🎯 כדי להגיע ל${k.goal.name} תוך ${months} חודשים — הריבית לבד תעשה את העבודה!`);
  }
  return recs;
}

// ── MODAL/TOAST ──
window.openModal=(id)=>document.getElementById(id)?.classList.add('open');
window.closeModal=(id)=>document.getElementById(id)?.classList.remove('open');
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(type==='err'?' err':type==='info'?' info':'');
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600);
}
window.toast=toast;

function show(id){
  document.querySelectorAll('.screen,.carousel-outer').forEach(s=>s.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
  document.getElementById('gear').style.display=id==='dad-carousel'?'block':'none';
}

  </div>`;
  show('loading');
}

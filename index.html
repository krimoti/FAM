<!DOCTYPE html>

<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ארנק חכם 💰</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Rubik:wght@400;500;600;700&display=swap');

:root {
–dark:#12121F; –card:#1C1C2E; –card2:#252540;
–text:#EEEEF8; –dim:#8888AA; –border:rgba(255,255,255,.07);
–yellow:#FFD166; –orange:#FF9F43; –green:#06D6A0;
–red:#FF6B6B; –blue:#4CC9F0; –purple:#C77DFF;
–c0:#FF6B9D;–c1:#C77DFF;–c2:#4CC9F0;–c3:#06D6A0;–c4:#FFD166;–c5:#FF9F43;
–splash-duration: 3000;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:‘Rubik’,sans-serif;background:var(–dark);color:var(–text);}

/* ══ BG ══ */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg span{position:absolute;border-radius:50%;opacity:.04;animation:fl 10s ease-in-out infinite;}
.bg span:nth-child(1){width:400px;height:400px;background:#FF6B9D;top:-100px;right:-120px;}
.bg span:nth-child(2){width:280px;height:280px;background:#C77DFF;bottom:40px;left:-90px;animation-delay:3s;}
.bg span:nth-child(3){width:200px;height:200px;background:#4CC9F0;top:40%;left:40%;animation-delay:6s;}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}

/* ══ SCREENS ══ */
.screen{position:fixed;inset:0;z-index:1;display:none;flex-direction:column;overflow-y:auto;overflow-x:hidden;}
.screen.active{display:flex;}

/* ══════════════════════════════════════
SPLASH
══════════════════════════════════════ */
#splash{
z-index:999;background:var(–dark);
align-items:center;justify-content:center;flex-direction:column;gap:0;
overflow:hidden;
}
.splash-coins{position:absolute;inset:0;pointer-events:none;}
.coin{
position:absolute;font-size:2rem;opacity:0;
animation:coinFall linear forwards;
}
@keyframes coinFall{
0%  {transform:translateY(-60px) rotate(0deg);opacity:1;}
80% {opacity:1;}
100%{transform:translateY(110vh) rotate(720deg);opacity:0;}
}
.splash-logo{
font-family:‘Fredoka One’;font-size:4rem;color:var(–yellow);
text-shadow:0 0 60px rgba(255,209,102,.5);
opacity:0;animation:splashIn .8s .3s cubic-bezier(.34,1.3,.64,1) forwards;
text-align:center;z-index:2;
}
.splash-sub{
font-size:1.1rem;color:var(–dim);margin-top:8px;
opacity:0;animation:splashIn .8s .7s cubic-bezier(.34,1.3,.64,1) forwards;
text-align:center;z-index:2;
}
.splash-bar-wrap{
width:160px;height:4px;background:rgba(255,255,255,.08);border-radius:99px;
margin-top:30px;z-index:2;overflow:hidden;
opacity:0;animation:splashIn .6s 1s ease forwards;
}
.splash-bar-fill{
height:100%;background:var(–yellow);border-radius:99px;
width:0%;animation:splashBar linear 1s forwards;
animation-delay:1.1s;
}
@keyframes splashIn{to{opacity:1;}}
@keyframes splashBar{to{width:100%;}}
@keyframes splashOut{to{opacity:0;transform:scale(1.05);}}

/* STARS BURST ANIMATION */
.stars-container{position:absolute;inset:0;overflow:hidden;}
.star-burst{
position:absolute;
animation:starBurst ease-out forwards;
opacity:0;
}
@keyframes starBurst{
0%  {opacity:0;transform:translate(0,0) scale(0) rotate(0deg);}
15% {opacity:1;transform:translate(var(–tx),var(–ty)) scale(1.3) rotate(90deg);}
60% {opacity:1;transform:translate(var(–tx2),var(–ty2)) scale(1) rotate(180deg);}
100%{opacity:0;transform:translate(var(–tx3),var(–ty3)) scale(0.2) rotate(360deg);}
}
.star-orbit{
position:absolute;
left:50%;top:50%;
animation:starOrbit linear infinite;
transform-origin:0 0;
}
@keyframes starOrbit{
from{transform:rotate(0deg) translateX(var(–r)) rotate(0deg);}
to{transform:rotate(360deg) translateX(var(–r)) rotate(-360deg);}
}
.star-twinkle{
position:absolute;
animation:twinkle ease-in-out infinite alternate;
}
@keyframes twinkle{
0%{opacity:.2;transform:scale(.5);}
100%{opacity:1;transform:scale(1.3);}
}
.center-star{
position:absolute;left:50%;top:40%;
transform:translate(-50%,-50%);
font-size:5rem;
animation:centerPulse 1s ease-in-out infinite alternate;
z-index:2;
}
@keyframes centerPulse{
from{transform:translate(-50%,-50%) scale(1);filter:drop-shadow(0 0 10px gold);}
to{transform:translate(-50%,-50%) scale(1.15);filter:drop-shadow(0 0 30px gold);}
}

/* UNICORN ANIMATION */
.unicorn-wrap{
position:absolute;
animation:unicornRun linear forwards;
font-size:4.5rem;
bottom:22%;
white-space:nowrap;
}
@keyframes unicornRun{
0%  {right:-100px;}
40% {right:calc(50% - 44px);}
60% {right:calc(50% - 44px);}
100%{right:110%;}
}
.unicorn-bubble{
position:absolute;top:-52px;right:0;
background:linear-gradient(135deg,#FF6B9D,#C77DFF);
color:white;border-radius:16px;padding:7px 13px;
font-size:.85rem;font-family:‘Rubik’;font-weight:700;
opacity:0;animation:bubblePop .4s ease forwards;
white-space:nowrap;box-shadow:0 4px 15px rgba(199,125,255,.4);
}
.unicorn-bubble::after{content:’’;position:absolute;bottom:-8px;right:14px;
border:8px solid transparent;border-top-color:#C77DFF;border-bottom:none;}
.rainbow-star{
position:absolute;
animation:starFloat ease-out forwards;
font-size:1.6rem;opacity:0;
}
@keyframes starFloat{
0%  {opacity:1;transform:translateY(0) scale(1) rotate(0deg);}
100%{opacity:0;transform:translateY(-80px) scale(0.3) rotate(360deg);}
}
.rainbow-trail{
position:absolute;bottom:18%;
width:12px;height:12px;border-radius:50%;
animation:trailFade .8s ease forwards;
opacity:0;
}
@keyframes trailFade{0%{opacity:.8;transform:scale(1)}100%{opacity:0;transform:scale(0)}}

/* DOG ANIMATION */
.dog-wrap{
position:absolute;bottom:20%;
animation:dogWalk linear forwards;
font-size:4rem;
white-space:nowrap;
}
@keyframes dogWalk{
0%  {right:-80px;transform:scaleX(1);}
45% {right:calc(50% - 40px);transform:scaleX(1);}
50% {right:calc(50% - 40px);transform:scaleX(1) scale(1.2);}
55% {right:calc(50% - 40px);transform:scaleX(1);}
100%{right:110%;transform:scaleX(1);}
}
.dog-bubble{
position:absolute;top:-50px;right:10px;
background:white;color:#333;border-radius:16px;padding:6px 12px;
font-size:.9rem;font-family:‘Rubik’;font-weight:700;
opacity:0;animation:bubblePop .4s ease forwards;
white-space:nowrap;
}
.dog-bubble::after{content:’’;position:absolute;bottom:-8px;right:16px;
border:8px solid transparent;border-top-color:white;border-bottom:none;}
@keyframes bubblePop{to{opacity:1;}}
.dog-paw{
position:absolute;font-size:1.2rem;opacity:0;
animation:pawPrint .3s ease forwards;
}
@keyframes pawPrint{0%{opacity:.8;transform:scale(1.2)}100%{opacity:0;transform:scale(.8)}}

/* ══════════════════════════════════════
LOGIN
══════════════════════════════════════ */
#login{align-items:center;justify-content:center;padding:40px 24px;gap:20px;}
.login-logo{font-family:‘Fredoka One’;font-size:2.2rem;color:var(–yellow);text-align:center;}
.login-users{display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px;}
.login-card{
background:var(–card);border-radius:18px;padding:16px 20px;
display:flex;align-items:center;gap:14px;cursor:pointer;
border:2px solid transparent;transition:all .18s;
}
.login-card:active{transform:scale(.97);}
.login-card .lc-av{font-size:2.2rem;}
.login-card .lc-av img{width:44px;height:44px;border-radius:50%;object-fit:cover;}
.login-card .lc-name{font-weight:700;font-size:1rem;}
.login-card .lc-hint{font-size:.78rem;color:var(–dim);margin-top:2px;}
.login-pin-wrap{
width:100%;max-width:340px;background:var(–card);border-radius:20px;padding:20px;
display:none;flex-direction:column;align-items:center;gap:14px;
}
.login-pin-wrap.show{display:flex;}
.pin-who{font-family:‘Fredoka One’;font-size:1.5rem;}
.pin-dots{display:flex;gap:12px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(–dim);transition:all .14s;}
.pin-dot.on{background:var(–yellow);border-color:var(–yellow);transform:scale(1.2);}
.pin-err{color:var(–red);font-size:.84rem;height:16px;}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;width:100%;}
.kk{background:var(–card2);border:none;border-radius:13px;padding:15px;font-size:1.25rem;font-weight:700;color:var(–text);cursor:pointer;font-family:‘Rubik’;transition:background .1s,transform .1s;}
.kk:active{transform:scale(.9);}
.kk.del{font-size:.88rem;color:var(–dim);}
.kk.emp{background:transparent;cursor:default;pointer-events:none;}
.btn-back{background:none;border:1px solid rgba(255,255,255,.12);color:var(–dim);padding:8px 20px;border-radius:10px;cursor:pointer;font-family:‘Rubik’;font-size:.84rem;}

/* ══════════════════════════════════════
CAROUSEL WRAPPER
══════════════════════════════════════ */
.carousel-outer{
position:fixed;inset:0;z-index:10;display:none;
flex-direction:column;
}
.carousel-outer.active{display:flex;}

/* top bar */
.top-bar{
padding:50px 18px 14px;display:flex;align-items:center;gap:10px;
flex-shrink:0;position:relative;z-index:10;
}
.top-bar .tav{font-size:2rem;cursor:pointer;}
.top-bar .tav img{width:44px;height:44px;border-radius:50%;object-fit:cover;}
.top-bar .tname{font-family:‘Fredoka One’;font-size:1.3rem;flex:1;}
.top-bar .tsync{font-size:.68rem;color:var(–green);display:flex;align-items:center;gap:4px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(–green);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.top-bar .tlogout{background:rgba(255,255,255,.06);border:none;border-radius:9px;padding:7px 11px;color:var(–dim);cursor:pointer;font-size:.78rem;font-family:‘Rubik’;}

/* slides container */
.slides-track{
flex:1;position:relative;overflow:hidden;
}
.slide{
position:absolute;top:0;left:0;width:100%;height:100%;
overflow-y:auto;overflow-x:hidden;
padding-bottom:80px;
-webkit-overflow-scrolling:touch;
transition:transform .32s cubic-bezier(.4,0,.2,1);
}

/* swipe indicator dots */
.swipe-dots{
position:absolute;bottom:68px;left:0;right:0;
display:flex;justify-content:center;gap:6px;z-index:10;pointer-events:none;
}
.sdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .25s;}
.sdot.active{width:20px;background:var(–yellow);}

/* tab bar */
.tab-bar{
position:absolute;bottom:0;left:0;right:0;
background:rgba(18,18,31,.96);backdrop-filter:blur(16px);
border-top:1px solid var(–border);
display:flex;padding:6px 2px 18px;z-index:20;
overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{flex:0 0 auto;min-width:52px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 2px;border-radius:10px;}
.tab .ti{font-size:1.15rem;}
.tab .tl{font-size:.58rem;color:var(–dim);transition:color .15s;white-space:nowrap;}
.tab.active .tl{color:var(–yellow);}
.tab.active .ti{animation:tabPop .25s cubic-bezier(.34,1.5,.64,1);}
@keyframes tabPop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.tnotif{position:absolute;top:3px;right:4px;background:var(–red);color:#fff;border-radius:50%;width:14px;height:14px;font-size:.58rem;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* ══════════════════════════════════════
COMMON COMPONENTS
══════════════════════════════════════ */
.sec-pad{padding:14px 16px 0;}
.sec-ttl{font-size:.78rem;color:var(–dim);margin-bottom:10px;letter-spacing:.05em;font-weight:600;}
.card-block{background:var(–card);border-radius:18px;padding:16px;margin-bottom:12px;}
.card-block h4{font-size:.86rem;font-weight:700;color:var(–dim);margin-bottom:12px;}
.arow{display:flex;gap:7px;align-items:flex-end;}
.iw{flex:1;}
.iw label{display:block;font-size:.7rem;color:var(–dim);margin-bottom:3px;}
.iw input,.iw select,.iw textarea{
width:100%;background:var(–dark);border:1.5px solid rgba(255,255,255,.08);
border-radius:10px;padding:9px 11px;color:var(–text);
font-family:‘Rubik’;font-size:.88rem;transition:border-color .2s;
}
.iw input:focus,.iw select:focus,.iw textarea:focus{outline:none;border-color:var(–yellow);}
.iw textarea{resize:none;height:56px;}
.btn-g,.btn-r,.btn-y,.btn-p,.btn-b,.btn-o{
border:none;border-radius:10px;padding:10px 13px;
font-family:‘Fredoka One’;font-size:.88rem;cursor:pointer;
transition:transform .1s,box-shadow .15s;white-space:nowrap;
}
.btn-g{background:var(–green);color:#0A0A1A;}
.btn-r{background:var(–red);color:#fff;}
.btn-y{background:var(–yellow);color:#1A1A2E;}
.btn-p{background:var(–purple);color:#0A0A1A;}
.btn-b{background:var(–blue);color:#0A0A1A;}
.btn-o{background:var(–orange);color:#1A1A2E;}
.btn-g:active,.btn-r:active,.btn-y:active,.btn-p:active,.btn-b:active,.btn-o:active{transform:scale(.93);}
.btn-full{width:100%;display:block;text-align:center;padding:13px;}
.divider{height:1px;background:var(–border);margin:8px 0;}
.empty-state{color:var(–dim);text-align:center;padding:28px 16px;font-size:.84rem;}

/* ══ BALANCE CARD ══ */
.bal-card{
margin:0 16px 12px;padding:26px 20px;border-radius:22px;
background:linear-gradient(135deg,var(–card),var(–card2));
text-align:center;
}
.bal-label{font-size:.84rem;color:var(–dim);margin-bottom:6px;}
.bal-amount{font-family:‘Fredoka One’;line-height:1;margin-bottom:5px;}
.bal-upd{font-size:.74rem;color:var(–dim);}
.bal-em{font-size:1.5rem;margin-top:5px;display:block;}

/* ══ GOAL BAR ══ */
.goal-bar-wrap{background:var(–card);border-radius:16px;padding:14px;margin:0 16px 12px;}
.goal-bar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.goal-title{font-size:.86rem;font-weight:700;}
.goal-pct{font-size:.8rem;color:var(–dim);}
.goal-track{height:9px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;}
.goal-fill{height:100%;border-radius:99px;transition:width .7s cubic-bezier(.34,1.3,.64,1);}
.goal-amounts{display:flex;justify-content:space-between;margin-top:5px;font-size:.72rem;color:var(–dim);}
.goal-funny{text-align:center;margin-top:8px;font-size:.82rem;line-height:1.45;}

/* ══ SAVINGS CARD ══ */
.sav-card{
margin:0 16px 12px;padding:16px;border-radius:18px;
background:linear-gradient(135deg,rgba(6,214,160,.1),rgba(6,214,160,.04));
border:1px solid rgba(6,214,160,.2);
}
.sav-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
.sav-cell{background:rgba(255,255,255,.04);border-radius:11px;padding:9px;text-align:center;}
.sav-cell .sc-label{font-size:.68rem;color:var(–dim);margin-bottom:2px;}
.sav-cell .sc-val{font-size:1.05rem;font-weight:700;}

/* ══ TX LIST ══ */
.tx{background:var(–card);border-radius:13px;padding:12px;margin-bottom:7px;display:flex;align-items:center;gap:10px;}
.tx-ic{font-size:1.2rem;}
.tx-body{flex:1;}
.tx-note{font-size:.88rem;font-weight:600;}
.tx-date{font-size:.72rem;color:var(–dim);margin-top:1px;}
.tx-amt{font-size:.98rem;font-weight:700;}
.tx-amt.pos{color:var(–green);}
.tx-amt.neg{color:var(–red);}
.tx-amt.sav{color:#4CC9F0;}

/* ══ TASKS ══ */
.task-card{background:var(–card);border-radius:13px;padding:12px;margin-bottom:7px;display:flex;align-items:center;gap:10px;}
.task-emoji{font-size:1.4rem;}
.task-body{flex:1;}
.task-name{font-size:.88rem;font-weight:600;}
.task-bonus{font-size:.76rem;color:var(–green);margin-top:1px;}
.task-status.done-wait{color:var(–orange);font-size:.74rem;margin-top:2px;}
.task-status.approved{color:var(–green);font-size:.74rem;margin-top:2px;}
.btn-task-done{background:rgba(6,214,160,.12);border:1px solid rgba(6,214,160,.3);color:var(–green);border-radius:9px;padding:6px 11px;font-family:‘Rubik’;font-size:.76rem;cursor:pointer;font-weight:600;white-space:nowrap;}

/* ══ REQUESTS ══ */
.req-item{background:var(–card);border-radius:13px;padding:12px;margin-bottom:7px;}
.req-top{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.req-name{font-size:.88rem;font-weight:600;flex:1;}
.req-amt{font-size:.84rem;color:var(–yellow);font-weight:700;}
.req-note{font-size:.76rem;color:var(–dim);}
.req-badge{font-size:.7rem;padding:2px 8px;border-radius:99px;font-weight:700;}
.req-badge.waiting{background:rgba(255,209,102,.15);color:var(–yellow);}
.req-badge.approved{background:rgba(6,214,160,.15);color:var(–green);}
.req-badge.rejected{background:rgba(255,107,107,.15);color:var(–red);}

/* ══ DESIGN TAB ══ */
.theme-swatch{width:42px;height:42px;border-radius:13px;cursor:pointer;position:relative;overflow:hidden;transition:all .2s;}

/* ══ MINI HIST ══ */
.mtx{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:.79rem;}
.mtx:last-child{border:none;}
.mtx .mn{flex:1;color:var(–dim);}
.mtx .ma{font-weight:700;}
.mtx .ma.pos{color:var(–green);}
.mtx .ma.neg{color:var(–red);}
.mtx .ma.set{color:var(–yellow);}
.mtx .ma.sav{color:#4CC9F0;}
.mtx .md{font-size:.68rem;color:rgba(255,255,255,.2);}

/* ══ DAD KID SELECTOR ══ */
.kid-select{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;}
.ks-btn{background:var(–card);border:2px solid transparent;border-radius:11px;padding:7px 13px;cursor:pointer;font-family:‘Rubik’;font-size:.82rem;color:var(–dim);transition:all .14s;}
.ks-btn.active{color:var(–text);font-weight:700;}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(120px);background:var(–green);color:#0A0A1A;padding:10px 20px;border-radius:50px;font-weight:700;font-size:.84rem;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:9999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{background:var(–red);color:#fff;}
.toast.info{background:var(–blue);color:#0A0A1A;}

/* ══ MODAL ══ */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92) !important;z-index:9999 !important;align-items:flex-end;justify-content:center;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);}
.overlay.open{display:flex;}
.modal{background:#1a1a2e !important;border-radius:24px 24px 0 0;padding:24px 20px 36px;width:100%;max-width:460px;animation:slideUp .26s cubic-bezier(.34,1.3,.64,1);max-height:86vh;overflow-y:auto;position:relative;z-index:10000;box-shadow:0 -4px 40px rgba(0,0,0,.8);}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h3{font-family:‘Fredoka One’;font-size:1.25rem;margin-bottom:14px;color:#EEEEF8 !important;}
.mfield{margin-bottom:11px;}
.mfield label{display:block;font-size:.72rem;color:#8888AA !important;margin-bottom:3px;}
.mfield input,.mfield select{width:100%;background:#0d0d1a !important;border:1.5px solid rgba(255,255,255,.2) !important;border-radius:10px;padding:9px 11px;color:#EEEEF8 !important;font-family:‘Rubik’;font-size:.88rem;}
.mfield input:focus,.mfield select:focus{outline:none;border-color:#FFD166 !important;box-shadow:0 0 0 3px rgba(255,209,102,.2);}
.mbtns{display:flex;gap:8px;margin-top:8px;}
.mbtns button{flex:1;border:none;border-radius:10px;padding:11px;font-family:‘Fredoka One’;font-size:.9rem;cursor:pointer;}
.mbtns .msave{background:var(–yellow);color:var(–dark);}
.mbtns .mcancel{background:rgba(255,255,255,.07);color:var(–text);}
.mdel{width:100%;border:none;border-radius:10px;padding:10px;background:rgba(255,107,107,.15) !important;color:#FF6B6B !important;font-family:‘Fredoka One’;font-size:.88rem;cursor:pointer;margin-top:7px;}

<script type="module">

// ── THEMES & FONTS ──
const THEMES = [
  {name:'לילה',     bg:'#12121F',card:'#1C1C2E',card2:'#252540',accent:'#FFD166',text:'#EEEEF8',dim:'#8888AA'},

  {name:'כתום',     bg:'#2A1400',card:'#3A1E00',card2:'#4A2800',accent:'#FF9F43',text:'#FFE8CC',dim:'#CC8844'},
  {name:'בהיר',     bg:'#F0F0F8',card:'#FFFFFF',card2:'#E8E8F5',accent:'#4361EE',text:'#1A1A2E',dim:'#6666AA'},
  {name:'ורוד בהיר',bg:'#FFF0F5',card:'#FFFFFF',card2:'#FFE0EC',accent:'#E0006A',text:'#2D0020',dim:'#AA4477'},
  {name:'מנטה',     bg:'#E8FFF5',card:'#FFFFFF',card2:'#D0FFE8',accent:'#00875A',text:'#002A1A',dim:'#44AA77'},
  {name:'שמיים',    bg:'#E8F4FF',card:'#FFFFFF',card2:'#D0E8FF',accent:'#0066CC',text:'#001A33',dim:'#4488BB'},
];
const COLORS = ['#FF6B9D','#C77DFF','#4CC9F0','#06D6A0','#FFD166','#FF9F43','#FF6B6B','#4361EE'];
const FONT_SIZES = [
  {name:'8', base:'11px',bal:'2.4rem',title:'1.1rem'},
  {name:'10',base:'13px',bal:'2.8rem',title:'1.2rem'},
  {name:'12',base:'14px',bal:'3.0rem',title:'1.3rem'},
  {name:'14',base:'15px',bal:'3.2rem',title:'1.4rem'},
  {name:'16',base:'16px',bal:'3.5rem',title:'1.5rem'},
  {name:'18',base:'17px',bal:'3.8rem',title:'1.6rem'},
  {name:'20',base:'19px',bal:'4.0rem',title:'1.7rem'},
  {name:'22',base:'21px',bal:'4.4rem',title:'1.9rem'},
  {name:'24',base:'23px',bal:'4.8rem',title:'2.1rem'},
  {name:'26',base:'25px',bal:'5.2rem',title:'2.3rem'},
];

// ── STATE ──
let D = { dad:{name:'אבא',emoji:'👨',pin:'0000',themeIdx:0,fontIdx:4,splashDur:3,splashText:'המשפחה שלנו',splashType:'money'}, kids:[] };

let pinBuf='', pinTarget=null;
let unsubs=[];
let editKidId=null, kmThemeIdx=0, kmAvatarData='';
let dmThemeIdx=0;
let childSlideIdx=0, dadSlideIdx=0;
let touchStartX=0, touchStartY=0;
let carouselRenderFns={}; // store per trackId
let carouselTabCounts={};

// ── LOAD ──
async function loadAll() {
  const snap = await getDoc(cfgRef());
  if (snap.exists()) {
    D.dad  = {...D.dad, ...snap.data().dad};
    D.kids = snap.data().kids || [];
  } else {
    await setDoc(cfgRef(),{dad:D.dad,kids:[]});
  }
  for (const k of D.kids) {
    const ks = await getDoc(kidRef(k.id));
    if (ks.exists()) Object.assign(k, ks.data());
    else await setDoc(kidRef(k.id),{balance:0,savings:0,savingsRate:3.9,lastSavingsMonth:'',history:[],message:'',goal:null,graphData:[],avatar:'',themeIdx:0,fontIdx:4});
    const ts = await getDoc(taskRef(k.id));
    k.tasks = ts.exists() ? (ts.data().tasks||[]) : [];
    const rs = await getDoc(reqRef(k.id));
    k.requests = rs.exists() ? (rs.data().requests||[]) : [];
  }
}

async function saveConfig() {
  await setDoc(cfgRef(),{
    dad: D.dad,
    kids: D.kids.map(k=>({id:k.id,name:k.name,emoji:k.emoji,pin:k.pin,ci:k.ci,themeIdx:k.themeIdx,fontIdx:k.fontIdx}))
  });
}

async function saveKidData(k) {
  await setDoc(kidRef(k.id),{
    balance:k.balance||0, savings:k.savings||0, savingsRate:k.savingsRate??3.9,
    lastSavingsMonth:k.lastSavingsMonth||'', history:k.history||[],
    message:k.message||'', goal:k.goal||null, graphData:k.graphData||[],
    avatar:k.avatar||'', themeIdx:k.themeIdx??0, fontIdx:k.fontIdx??4
  });
}
async function saveKidTasks(k){ await setDoc(taskRef(k.id),{tasks:k.tasks||[]}); }
async function saveKidReqs(k){ await setDoc(reqRef(k.id),{requests:k.requests||[]}); }

// ── THEME ──
function kidColor(k){ return COLORS[(k.ci||0)%COLORS.length]; }

const DEFAULT_PRIZES=[
  {id:'p1',name:'בחירת ארוחת ערב',emoji:'🍕',price:50,desc:'את/ה בוחר/ת מה לאכול הערב'},
  {id:'p2',name:'שעת מסך נוספת',emoji:'📱',price:30,desc:'+1 שעת טלוויזיה/מחשב'},
  {id:'p3',name:'יציאה לקפה',emoji:'☕',price:80,desc:'יציאה עם אבא/אמא לקפה'},
  {id:'p4',name:'פעילות לבחירה',emoji:'🎡',price:120,desc:'פעילות מיוחדת שתבחר/י'},
  {id:'p5',name:'הפסקת מטלות יום',emoji:'🛋️',price:100,desc:'יום אחד ללא מטלות'},
];
function g(k, female, male){ return (k.gender||'f')==='f' ? female : male; }
// g(k,'חסכנית','חסכן'), g(k,'גדולה','גדול'), g(k,'אלופה','אלוף')

function applyTheme(themeIdx, fontIdx){
  const t=THEMES[themeIdx??0];
  const f=FONT_SIZES[fontIdx??4];
  const r=document.documentElement;
  r.style.setProperty('--dark',t.bg);
  r.style.setProperty('--card',t.card);
  r.style.setProperty('--card2',t.card2);
  r.style.setProperty('--text',t.text);
  r.style.setProperty('--dim',t.dim);
  r.style.setProperty('--yellow',t.accent);
  r.style.setProperty('--green',t.accent);
  r.style.setProperty('--blue',t.accent);
  r.style.setProperty('--purple',t.accent);
  r.style.setProperty('--orange',t.accent);
  r.style.setProperty('--border',t.bg.startsWith('#F')||t.bg.startsWith('#E')?'rgba(0,0,0,.08)':'rgba(255,255,255,.07)');
  document.body.style.background=t.bg;
  document.body.style.color=t.text;
  r.style.fontSize=f.base;
}
function resetTheme(){
  ['--dark','--card','--card2','--text','--dim','--yellow','--green','--blue','--purple','--orange','--border'].forEach(v=>document.documentElement.style.removeProperty(v));
  document.body.style.background='';
  document.body.style.color='';
  document.documentElement.style.fontSize='';
}

function runSplash(onDone){

  title.textContent = '💰 ארנק חכם';

    const unicornWrap=document.createElement('div');

    const animDur=(dur/1000*0.9)+'s';
    unicornWrap.style.animationDuration=animDur;
    unicornWrap.style.animationDelay='0.3s';

    const bubble=document.createElement('div');
    bubble.className='unicorn-bubble';
    bubble.textContent='✨ אני הכי מגניבה! ✨';
    bubble.style.animationDelay=(dur/1000*0.38)+'s';
    unicornWrap.appendChild(bubble);
    container.appendChild(unicornWrap);

    // Rainbow stars exploding from center at mid-point
    const stars=['⭐','🌟','💫','✨','🌈','💜','💗','💛','🦋','🌸'];
    for(let i=0;i<20;i++){
      const s=document.createElement('div');

      s.textContent=stars[Math.floor(Math.random()*stars.length)];
      s.style.left=(Math.random()*90)+'%';
      s.style.bottom=(15+Math.random()*60)+'%';

      s.style.animationDelay=delay+'s';
      s.style.animationDuration=(0.6+Math.random()*1.2)+'s';
      s.style.fontSize=(1+Math.random()*1.5)+'rem';
      container.appendChild(s);
    }

    // Rainbow trail dots
    const rainbow=['#FF6B9D','#FF9F43','#FFD166','#06D6A0','#4CC9F0','#C77DFF'];
    for(let i=0;i<12;i++){
      const t=document.createElement('div');
      t.className='rainbow-trail';
      t.style.right=(8+i*8)+'%';
      t.style.background=rainbow[i%rainbow.length];
      t.style.animationDelay=(dur/1000*0.2+i*0.12)+'s';
      container.appendChild(t);
    }
  } else if(type==='dog'){
    // Walking dog animation
    const dogWrap=document.createElement('div');
    dogWrap.className='dog-wrap';
    dogWrap.style.animationDuration=(dur/1000*0.85)+'s';
    dogWrap.style.animationDelay='0.5s';
    dogWrap.innerHTML='🐕';

    const bubble=document.createElement('div');
    bubble.className='dog-bubble';
    bubble.textContent='שלום! 👋';
    // bubble appears at midpoint
    bubble.style.animationDelay=(dur/1000*0.42)+'s';
    dogWrap.appendChild(bubble);

    // wave paw emoji timed at mid
    const paw=document.createElement('div');
    paw.style.cssText=`position:absolute;top:-20px;left:-10px;font-size:1.8rem;animation:none;`;
    paw.textContent='🐾';
    dogWrap.appendChild(paw);

    container.appendChild(dogWrap);

    // Scatter paw prints on ground
    for(let i=0;i<8;i++){
      const pw=document.createElement('div');
      pw.className='dog-paw';
      pw.textContent='🐾';
      pw.style.bottom=(5+Math.random()*8)+'%';
      pw.style.right=(10+i*11)+'%';
      pw.style.animationDelay=(0.5+i*0.3)+'s';
      container.appendChild(pw);
    }
  } else if(type==='stars'){
    // Center big star
    const center=document.createElement('div');
    center.className='center-star';
    center.textContent='⭐';
    container.appendChild(center);

    // Orbiting stars at different radii
    const orbitItems=['🌟','💫','✨','⭐','🌙','☀️'];
    [60,110,160].forEach((r,ri)=>{
      const count=4+ri*2;
      for(let i=0;i<count;i++){
        const s=document.createElement('div');
        s.className='star-orbit';
        s.style.setProperty('--r',r+'px');
        s.style.animationDuration=(3+ri*1.5+(i%3)*0.5)+'s';
        s.style.animationDelay=-(i/count*3)+'s';
        s.style.marginTop='-14px';
        s.style.marginLeft='-14px';
        s.innerHTML=`<span style="font-size:${1.2-ri*0.2}rem">${orbitItems[i%orbitItems.length]}</span>`;
        container.appendChild(s);
      }
    });

    // Burst stars from center outward
    const burstItems=['⭐','🌟','💫','✨','💥','🌠'];
    for(let i=0;i<30;i++){
      const s=document.createElement('div');
      s.className='star-burst';
      const angle=Math.random()*360;
      const d1=80+Math.random()*100;
      const d2=150+Math.random()*150;
      const d3=200+Math.random()*200;
      const rad=angle*Math.PI/180;
      s.style.setProperty('--tx',Math.cos(rad)*d1+'px');
      s.style.setProperty('--ty',Math.sin(rad)*d1+'px');
      s.style.setProperty('--tx2',Math.cos(rad)*d2+'px');
      s.style.setProperty('--ty2',Math.sin(rad)*d2+'px');
      s.style.setProperty('--tx3',Math.cos(rad)*d3+'px');
      s.style.setProperty('--ty3',Math.sin(rad)*d3+'px');
      s.style.left='50%'; s.style.top='42%';
      s.style.fontSize=(0.8+Math.random()*1.2)+'rem';
      s.style.animationDuration=(0.8+Math.random()*1.5)+'s';
      s.style.animationDelay=(Math.random()*(dur/1000*0.7))+'s';
      s.textContent=burstItems[Math.floor(Math.random()*burstItems.length)];
      container.appendChild(s);
    }

    // Twinkling background stars
    for(let i=0;i<20;i++){
      const s=document.createElement('div');
      s.className='star-twinkle';
      s.style.left=Math.random()*100+'%';
      s.style.top=Math.random()*100+'%';
      s.style.fontSize=(0.6+Math.random()*1)+'rem';
      s.style.animationDuration=(0.5+Math.random()*1.5)+'s';
      s.style.animationDelay=Math.random()*2+'s';
      s.textContent=['⭐','✨','💫'][Math.floor(Math.random()*3)];
      container.appendChild(s);
    }
  } else if(type!=='unicorn') {
    const items = SPLASH_TYPES[type]?.items || SPLASH_TYPES.money.items;
    for(let i=0;i<24;i++){
      const c=document.createElement('div');
      c.className='coin';
      c.textContent=items[Math.floor(Math.random()*items.length)];
      c.style.left=Math.random()*100+'%';
      c.style.fontSize=(1.4+Math.random()*2.2)+'rem';
      const d=0.3+Math.random()*2;
      const delay=Math.random()*Math.max(0.5,(dur/1000-d-0.5));
      c.style.animationDuration=d+'s';
      c.style.animationDelay=delay+'s';
      container.appendChild(c);
    }
  }

  document.getElementById('splash-bar').style.animationDuration=Math.max(0.5,(dur/1000-1.1))+'s';

  setTimeout(()=>{
    const s=document.getElementById('splash');
    s.style.animation='splashOut .5s ease forwards';
    setTimeout(()=>{ s.style.display='none'; onDone(); },500);
  }, dur);
}

window.doLogin=()=>{
  const username=(document.getElementById('login-username')?.value||'').trim().toLowerCase();
  const password=(document.getElementById('login-password')?.value||'').trim();
  const errEl=document.getElementById('login-err');

  // check dad
  if(username===D.dad.name.toLowerCase()||username==='אבא'||username===D.dad.name){
    if(password===D.dad.pin){
      errEl.textContent=''; currentUser={type:'dad'}; openDad();
    } else { errEl.textContent='❌ סיסמה שגויה'; shake(document.getElementById('login-password')); }
    return;
  }
  // check kids
  const k=D.kids.find(x=>x.name.toLowerCase()===username||x.name===username);
  if(k){
    if(password===k.pin){
      errEl.textContent=''; currentUser={type:'kid',id:k.id}; openChild(k.id);
    } else { errEl.textContent='❌ סיסמה שגויה'; shake(document.getElementById('login-password')); }
    return;
  }
  errEl.textContent='❌ שם משתמש לא קיים';
  shake(document.getElementById('login-username'));
};

function shake(el){
  if(!el)return;
  el.style.animation='none'; el.offsetHeight; el.style.animation='shake .4s';
}

function buildCarousel(containerId, trackId, tabsId, dotsId, tabs, renderFns){
  const track=document.getElementById(trackId);
  const tabBar=document.getElementById(tabsId);
  const dotsEl=document.getElementById(dotsId);
  track.innerHTML=''; tabBar.innerHTML=''; dotsEl.innerHTML='';

  tabs.forEach((t,i)=>{
    const slide=document.createElement('div');
    slide.className='slide';
    slide.id=trackId+'-slide-'+i;
    track.appendChild(slide);

    const tab=document.createElement('div');
    tab.className='tab'+(i===0?' active':'');
    tab.style.position='relative';
    tab.innerHTML=`<span class="ti">${t.icon}</span><span class="tl">${t.label}</span>`;
    if(t.badge) tab.innerHTML+=`<div class="tnotif" id="badge-${t.badge}"></div>`;
    tab.onclick=()=>goSlide(trackId,tabsId,dotsId,i,renderFns);
    tabBar.appendChild(tab);

    const dot=document.createElement('div');
    dot.className='sdot'+(i===0?' active':'');
    dotsEl.appendChild(dot);
  });

  // store for swipe handler
  carouselRenderFns[trackId]={fns:renderFns,tabsId,dotsId,count:tabs.length};
  carouselTabCounts[trackId]=tabs.length;

  // swipe
  track.addEventListener('touchstart',e=>{ touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; },{passive:true});
  track.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-touchStartX;
    const dy=e.changedTouches[0].clientY-touchStartY;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50){
      const info=carouselRenderFns[trackId];
      if(!info)return;
      const cur=trackId==='child-track'?childSlideIdx:dadSlideIdx;
      // dx<0 = swipe left = next, wrap around
      const count=info.count;
      const next=dx<0?(cur+1)%count:(cur-1+count)%count;
      goSlide(trackId,info.tabsId,info.dotsId,next,info.fns);
    }
  },{passive:true});

  renderFns[0](document.getElementById(trackId+'-slide-0'));
}

function goSlide(trackId,tabsId,dotsId,idx,renderFns){
  if(trackId==='child-track') childSlideIdx=idx;
  else dadSlideIdx=idx;

  const track=document.getElementById(trackId);
  const slides=track.querySelectorAll('.slide');
  slides.forEach((s,i)=>{
    s.style.transform=`translateX(${(i-idx)*100}%)`;
  });

  document.querySelectorAll('#'+tabsId+' .tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('#'+dotsId+' .sdot').forEach((d,i)=>d.classList.toggle('active',i===idx));

  // always re-render the active slide
  const slide=document.getElementById(trackId+'-slide-'+idx);
  if(slide && renderFns[idx]) renderFns[idx](slide);
}

// position slides initially
function initSlides(trackId){
  const slides=document.getElementById(trackId).querySelectorAll('.slide');
  slides.forEach((s,i)=>{ s.style.transform=`translateX(${i*100}%)`; });
}

function openChild(kidId){
  const k=D.kids.find(x=>x.id===kidId);
  applyTheme(k.themeIdx??0, k.fontIdx??4);
  checkAutoInterest(k);

  // header
  const cav=document.getElementById('cav');
  cav.innerHTML=k.avatar?`<img src="${k.avatar}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid ${kidColor(k)}">`:`<span>${k.emoji}</span>`;
  cav.onclick=()=>goSlide('child-track','child-tabs','child-dots',6,childRenderFns);
  document.getElementById('cname').textContent=k.name;
  document.getElementById('gear').style.display='none';

  childSlideIdx=0;
  const tabs=[
    {icon:'🏠',label:'בית'},
    {icon:'📈',label:'חיסכון'},
    {icon:'🎯',label:'יעד'},
    {icon:'✅',label:'משימות'},
    {icon:'💌',label:'בקשות',badge:'child-req-badge'},
    {icon:'🎁',label:'חנות'},
    {icon:'🎨',label:'עיצוב'},
  ];

  window.childRenderFns=[
    (el)=>renderChildHome(el,k),
    (el)=>renderChildSavings(el,k),
    (el)=>renderChildGoal(el,k),
    (el)=>renderChildTasks(el,k),
    (el)=>renderChildRequests(el,k),
    (el)=>renderChildStore(el,k),
    (el)=>renderChildDesign(el,k),
  ];

  buildCarousel('child-carousel','child-track','child-tabs','child-dots',tabs,childRenderFns);
  initSlides('child-track');
  show('child-carousel');

  // live listeners
  unsubs.push(onSnapshot(kidRef(kidId),snap=>{
    if(!snap.exists())return;
    Object.assign(k,snap.data());
    checkAutoInterest(k);
    const cur=childSlideIdx;
    const slideEl=document.getElementById('child-track-slide-'+cur);
    if(slideEl && window.childRenderFns && window.childRenderFns[cur]) window.childRenderFns[cur](slideEl);
  }));
  unsubs.push(onSnapshot(taskRef(kidId),snap=>{ if(snap.exists()){ k.tasks=snap.data().tasks||[]; updateChildBadge(k); } }));
  unsubs.push(onSnapshot(reqRef(kidId), snap=>{ if(snap.exists()){ k.requests=snap.data().requests||[]; updateChildBadge(k); } }));
}

function updateChildBadge(k){
  const el=document.getElementById('badge-child-req-badge');

  const n=(k.requests||[]).filter(r=>r.status==='approved'||r.status==='rejected').length;
  el.textContent=n||''; el.style.display=n?'flex':'none';
}

    const vals=graphData.map(p=>p.balance);

    const range=max-min||1;
    const W=300; const H=80;
    const pts=graphData.slice(-20).map((p,i,arr)=>{
      const x=i/(arr.length-1)*W;
      const y=H-((p.balance-min)/range)*H;

    }).join(' ');
    graphHtml=`

  el.innerHTML=`<div class="sec-pad">

    <div class="sav-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <span style="font-weight:700;font-size:.92rem">🏦 החיסכון שלי</span>
        <span style="background:rgba(6,214,160,.15);color:#06D6A0;border-radius:99px;padding:2px 10px;font-size:.72rem;font-weight:700">${k.savingsRate??3.9}% שנתי</span>

        <div class="sav-cell"><div class="sc-label">חיסכון נוכחי</div><div class="sc-val" style="color:#06D6A0">₪${savings.toFixed(2)}</div></div>
        <div class="sav-cell"><div class="sc-label">ריבית החודש</div><div class="sc-val" style="color:${col}">+₪${monthlyInterest.toFixed(2)}</div></div>
        <div class="sav-cell"><div class="sc-label">ריבית שנתית</div><div class="sc-val" style="color:${col}">+₪${yearlyInterest.toFixed(2)}</div></div>

window.removeReq=async(kidId,reqId)=>{
  const k=D.kids.find(x=>x.id===kidId);
  if(!k)return;
  k.requests=(k.requests||[]).filter(r=>r.id!==reqId);
  await saveKidReqs(k);
  const el=document.getElementById('ri-'+reqId);
  if(el){
    el.style.transition='all .3s ease';
    el.style.opacity='0';
    el.style.maxHeight='0';
    el.style.overflow='hidden';
    el.style.padding='0';
    el.style.margin='0';
    setTimeout(()=>el.remove(),320);
  }
  toast('🗑️ הבקשה הוסרה');
};
window.sendReq=async(kidId)=>{
  const k=D.kids.find(x=>x.id===kidId);
  const name=document.getElementById('rqnm-'+kidId)?.value.trim();
  const amount=parseFloat(document.getElementById('rqam-'+kidId)?.value)||0;
  const note=document.getElementById('rqnt-'+kidId)?.value.trim()||'';
  if(!name){toast('מה הבקשה?',true);return;}
  k.requests=[{id:'r'+Date.now(),name,amount,note,status:'waiting',date:nowStr()},...(k.requests||[])].slice(0,20);
  await saveKidReqs(k);
  document.getElementById('rqnm-'+kidId).value='';
  document.getElementById('rqam-'+kidId).value='';
  document.getElementById('rqnt-'+kidId).value='';
  toast('📨 נשלח לאבא!');
};

window.buyPrize=async(kidId,prizeId,prizeName,price)=>{
  const k=D.kids.find(x=>x.id===kidId);
  if(!k||(k.balance||0)<price){toast('אין מספיק כסף',true);return;}
  if(!confirm(`לקנות "${prizeName}" תמורת ₪${price}?`))return;
  k.balance=Math.round(((k.balance||0)-price)*100)/100;
  k.history=[{type:'sub',amount:price,note:`🎁 פרס: ${prizeName}`,date:nowStr()},...(k.history||[])].slice(0,60);
  // send request to dad
  k.requests=[{id:'prize'+Date.now(),name:`🎁 פרס: ${prizeName}`,amount:0,note:`נקנה תמורת ₪${price}`,status:'waiting',date:nowStr()},...(k.requests||[])].slice(0,20);
  await saveKidData(k);

  toast(`🎉 קנית "${prizeName}"! הודעה נשלחה לאבא`);

window.previewFont=(prefix,val)=>{
  const f=FONT_SIZES[parseInt(val)];
  const el=document.getElementById(prefix+'-fp-'+prefix.split('-')[1]||'dm-font-prev');
  // try both ids
  const el2=document.getElementById('cv-fp-'+prefix.replace('cv-',''));
  const el3=document.getElementById('dm-font-prev');
  if(el2){el2.style.fontSize=f.base;el2.textContent=`גודל ${f.name} — ₪123.45`;}
  if(el3&&prefix==='dm'){el3.style.fontSize=f.base;el3.textContent=`גודל ${f.name} — ₪123.45`;}
};
window.saveChildAvatar=async(kidId,e)=>{
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const img=new Image();
    img.onload=async()=>{
      const canvas=document.createElement('canvas');
      const max=200; let w=img.width,h=img.height;
      if(w>h){if(w>max){h=h*max/w;w=max;}}else{if(h>max){w=w*max/h;h=max;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const k=D.kids.find(x=>x.id===kidId);
      if(!k)return;
      k.avatar=canvas.toDataURL('image/jpeg',0.7);
      await saveKidData(k);
      renderChildDesign(document.getElementById('child-track-slide-5'),k);
      const cav=document.getElementById('cav');
      cav.innerHTML=`<img src="${k.avatar}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid ${kidColor(k)}">`;
      toast('📸 תמונה עודכנה!');
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
};

// history selection
let _histSelected={};
window.selectHistRange=(kidId,range)=>{
  const k=D.kids.find(x=>x.id===kidId); if(!k)return;
  const now=Date.now();
  const days=range==='week'?7:range==='month'?30:36500;
  const cutoff=now-days*24*60*60*1000;

  const eligible=(k.history||[]).filter(tx=>{
    if(tx.protected)return false;
    if(range==='all')return true;
    try{const p=tx.date.split(' ')[0].split('.');return new Date(+p[2],+p[1]-1,+p[0]).getTime()>cutoff;}
    catch{return false;}
  });

  if(!eligible.length){toast('אין תנועות לטווח זה');return;}

  // init all selected
  _histSelected[kidId]={};
  eligible.forEach(tx=>_histSelected[kidId][tx.date+tx.note]=true);

  const el=document.getElementById('hist-sel-'+kidId);
  const actEl=document.getElementById('hist-sel-actions-'+kidId);
  if(!el||!actEl)return;
  el.style.display='block'; actEl.style.display='block';

  el.innerHTML=eligible.map(tx=>{
    const key=tx.date+tx.note;
    const icon=tx.type==='add'||tx.type==='bonus'?'⬆️':tx.type==='sub'?'⬇️':tx.type==='savings'?'🏦':'📌';
    const amt=(tx.type==='add'||tx.type==='bonus'?'+':tx.type==='sub'?'-':'')+'₪'+Math.abs(tx.amount||0).toFixed(2);
    return `<label style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer">
      <input type="checkbox" id="hchk-${kidId}-${encodeURIComponent(key)}" checked
        onchange="_histSelected['${kidId}']['${key}']=this.checked"
        style="width:16px;height:16px;accent-color:var(--yellow)">
      <span style="font-size:1rem">${icon}</span>
      <span style="flex:1;font-size:.8rem">${tx.note||tx.type}</span>
      <span style="font-size:.78rem;color:${tx.type==='sub'?'var(--red)':'var(--green)'}">${amt}</span>
      <span style="font-size:.68rem;color:var(--dim)">${tx.date.split(' ')[0]}</span>
    </label>`;
  }).join('');
};

window.deleteSelectedHist=async(kidId)=>{
  const k=D.kids.find(x=>x.id===kidId); if(!k)return;
  const sel=_histSelected[kidId]||{};
  const toDelete=new Set(Object.keys(sel).filter(key=>sel[key]));
  if(!toDelete.size){toast('לא נבחרו תנועות',true);return;}
  if(!confirm(`למחוק ${toDelete.size} תנועות?`))return;
  k.history=(k.history||[]).filter(tx=>!toDelete.has(tx.date+tx.note)||tx.protected);
  await saveKidData(k);
  // hide
  const el=document.getElementById('hist-sel-'+kidId);

  if(el) el.style.display='none';

window.clearHistory=async(id)=>{
  const range=document.getElementById('hrange-'+id)?.value||'all';
  const k=D.kids.find(x=>x.id===id);
  if(!k||!confirm(`מחק היסטוריה (${range==='week'?'שבוע':range==='month'?'חודש':'הכל'})?`))return;
  if(range==='all'){ k.history=(k.history||[]).filter(tx=>tx.protected); }
  else {
    const days=range==='week'?7:30;
    const cutoff=Date.now()-days*24*60*60*1000;
    k.history=(k.history||[]).filter(tx=>{
      if(tx.protected)return true;
      try{const p=tx.date.split(' ')[0].split('.');return new Date(+p[2],+p[1]-1,+p[0]).getTime()>cutoff;}
      catch{return false;}
    });
  }
  await saveKidData(k); toast('🗑️ נמחק');
};

// auto interest
function checkAutoInterest(k){
  if(!k.savings||k.savings<=0)return;
  const now=new Date();
  const monthKey=`${now.getFullYear()}-${now.getMonth()}`;
  if(k.lastSavingsMonth===monthKey)return;
  const rate=(k.savingsRate??3.9)/100;
  const interest=Math.round(k.savings*rate/12*100)/100;
  if(interest<=0)return;
  k.savings=Math.round((k.savings+interest)*100)/100;
  k.lastSavingsMonth=monthKey;
  k.history=[{type:'savings',amount:interest,note:`ריבית חודשית (${k.savingsRate??3.9}%)`,date:nowStr(),protected:true},...(k.history||[])].slice(0,60);
  saveKidData(k);
}

window.addTask=async()=>{

  const emoji=document.getElementById('temoji')?.value.trim()||'✅';

  document.getElementById('tnm').value=''; document.getElementById('tbonus').value=''; document.getElementById('temoji').value='';

window.approveTask=async(kidId,taskId)=>{
  const k=D.kids.find(x=>x.id===kidId);
  const t=k.tasks.find(x=>x.id===taskId); if(!t)return;
  t.status='approved';
  k.balance=Math.round(((k.balance||0)+t.bonus)*100)/100;
  k.history=[{type:'bonus',amount:t.bonus,note:`בונוס: ${t.name}`,date:nowStr()},...(k.history||[])].slice(0,60);
  addGraphPt(k); await saveKidData(k); await saveKidTasks(k);
  toast(`🏅 בונוס ₪${t.bonus} נוסף!`); renderTasksList();
};
window.rejectTask=async(kidId,taskId)=>{

  const t=k.tasks.find(x=>x.id===taskId); if(!t)return;
  t.status='active'; await saveKidTasks(k); toast('↩️ הוחזר'); renderTasksList();
};
window.delTask=async(kidId,taskId)=>{
  const k=D.kids.find(x=>x.id===kidId);
  k.tasks=k.tasks.filter(x=>x.id!==taskId); await saveKidTasks(k); toast('🗑️ נמחק'); renderTasksList();
};

window.revokeBonus=async(kidId,taskId)=>{
  const k=D.kids.find(x=>x.id===kidId);
  const t=k.tasks.find(x=>x.id===taskId);
  if(!k||!t)return;

  // Strong warning
  const confirmed=confirm(
    `⚠️ ביטול בונוס — פעולה לא הפיכה!\n\n` +
    `המטלה: "${t.name}"\n` +
    `הבונוס שניתן: ₪${t.bonus}\n` +
    `הילד/ה: ${k.name}\n\n` +
    `₪${t.bonus} יקוזזו מיתרת ${k.name}.\n` +
    `האם אתה בטוח?`
  );
  if(!confirmed)return;

  // Double confirm for safety
  const confirmed2=confirm(`אישור סופי: לקזז ₪${t.bonus} מ${k.name}?`);
  if(!confirmed2){toast('בוטל — לא בוצע שינוי');return;}

  // Deduct bonus
  const newBal=Math.round(((k.balance||0)-t.bonus)*100)/100;
  if(newBal<0){
    const proceed=confirm(
      `⚠️ שים לב: ל${k.name} יש רק ₪${(k.balance||0).toFixed(2)}.\n` +
      `הקיזוז יוריד את היתרה ל-₪${newBal.toFixed(2)} (מינוס).\n` +
      `להמשיך בכל זאת?`
    );
    if(!proceed)return;
  }

  k.balance=Math.round(((k.balance||0)-t.bonus)*100)/100;
  k.history=[{
    type:'sub',
    amount:t.bonus,
    note:`↩️ ביטול בונוס: ${t.name}`,
    date:nowStr()
  },...(k.history||[])].slice(0,60);

  // Reset task to active
  t.status='active';

  await saveKidData(k);
  await saveKidTasks(k);
  toast(`↩️ בונוס ₪${t.bonus} בוטל — יתרת ${k.name} עודכנה`,'info');
  renderTasksList();
  // refresh wallet panel if visible
  renderDadWallet(document.getElementById('dad-track-slide-0'),kidId,()=>{});
};

window.doRestore=async(e)=>{
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    try {
      const backup=JSON.parse(ev.target.result);
      if(!backup.dad||!backup.kids){toast('קובץ גיבוי לא תקין',true);return;}
      if(!confirm(`שחזור מ-${new Date(backup.date).toLocaleDateString('he-IL')}?\nכל הנתונים הנוכחיים יוחלפו!`))return;
      
      D.dad={...D.dad,...backup.dad};
      D.kids=backup.kids;
      
      // save all to Firebase
      await saveConfig();
      for(const k of D.kids){
        await saveKidData(k);
        if(k.tasks) await saveKidTasks(k);
        if(k.requests) await saveKidReqs(k);
      }
      toast('✅ שוחזר בהצלחה!');
      // reload
      setTimeout(()=>location.reload(),1500);
    } catch(err){
      toast('שגיאה בשחזור: '+err.message,true);
    }
  };
  reader.readAsText(file);
  e.target.value='';
};

  a.click(); URL.revokeObjectURL(url); toast('💾 גיבוי הורד!');
};

    `😱🆘 0%!!! ${goalName} שכחה שהיא קיימת! בואי נזכיר לה! 🔔`,
    // חיות
    pct>=100?`🦁👑 ${goalName} כרע ברך! המלכה הגיעה! `:
    pct>=60?`🐆💨 ${pct}%! מהירה כמו נמר! ${goalName} לא יספיק לברוח! 🏃`:
    pct>=20?`🐌 ${pct}%... אט אט... ${goalName} עוד מחכה בסבלנות 🍃`:
    `🐣 ${pct}% — אפרוח קטן! בוא נגדל! 🌱`,
    // אמוג'י מוגזמים
    pct>=100?`🎊🥳🎉💥🌈✨🏆 הגעת ל${goalName}!! פיצוץ של שמחה!! 🎆🎇`:
    pct>=80?`😤😤😤💪💪 כמעט!! ${pct}%! `:
    pct>=50?`😊📈✨ חצי הדרך! ${goalName} מחייך/ת אליך! 😁`:
    `😅🙈 ${pct}%... עוד יש דרך! אבל מתחילים! 🏁`
  ];
  return styles[Math.floor(Math.random()*styles.length)];
}
function autoMsg(bal,name,kid){
  const gd=(f,m)=>g(kid||{gender:'f'},f,m);
  if(bal===0)return{i:'🌱',t:`${name}, הכל מתחיל בשקל הראשון!`};
  if(bal<20) return{i:'💪',t:`₪${bal.toFixed(2)} — יפה! ${gd('תמשיכי','תמשיך')} לצבור!`};
  if(bal<50) return{i:'⭐',t:`₪${bal.toFixed(2)} — ${gd('בדרך הנכונה','בדרך הנכון')}!`};
  if(bal<100)return{i:'🚀',t:`כבר ₪${bal.toFixed(2)}! קרוב ל-100!`};
  if(bal<200)return{i:'🎉',t:`₪${bal.toFixed(2)} — מאה ומעלה! ${gd('גדולה','גדול')}!`};
  if(bal<500)return{i:'👑',t:`₪${bal.toFixed(2)} — ${gd('חוסכת','חוסך')} כמו ${gd('אלופה','אלוף')}!`};
  return{i:'🏆',t:`₪${bal.toFixed(2)} — ${gd('חסכנית','חסכן')} אמיתי${gd('ת','')}`};
}
function getSavingsRecs(k){
  const recs=[];
  const savings=k.savings||0;
  const rate=(k.savingsRate??3.9)/100;
  const monthly=savings*rate/12;
  const gd=(f,m)=>g(k,f,m);
  if(savings<500)recs.push(`🌱 כש${gd('תגיעי','תגיע')} ל-₪500 הריבית תתחיל להיות מורגשת!`);
  if(savings>=500&&savings<2000)recs.push(`📈 כל ₪100 שמוסיפים = עוד ₪${((100*rate/12).toFixed(2))} ריבית לחודש!`);
  if(savings>=2000)recs.push(`🏆 חיסכון מרשים! ${gd('שקלי','שקול')} להגדיל ב-10%`);
  if(monthly>0)recs.push(`💰 הכסף עובד ${gd('בשבילך','בשבילך')}! החודש: +₪${monthly.toFixed(2)} ריבית 🎉`);
  if(k.goal&&k.goal.target>(k.balance||0)){
    const needed=k.goal.target-(k.balance||0);
    const months=monthly>0?Math.ceil(needed/monthly):999;
    if(months<999)recs.push(`🎯 כדי להגיע ל${k.goal.name} תוך ${months} חודשים — הריבית לבד תעשה את העבודה!`);
  }
  return recs;
}

// ── MODAL/TOAST ──
window.openModal=(id)=>document.getElementById(id)?.classList.add('open');
window.closeModal=(id)=>document.getElementById(id)?.classList.remove('open');
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(type==='err'?' err':type==='info'?' info':'');
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600);
}
window.toast=toast;

function show(id){
  document.querySelectorAll('.screen,.carousel-outer').forEach(s=>s.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
  document.getElementById('gear').style.display=id==='dad-carousel'?'block':'none';
}

// ── INIT ──
try {
  show('loading');
  await loadAll();
  runSplash(()=>showLogin());
  show('splash');
} catch(e) {
  document.getElementById('load-txt').textContent='';
  document.getElementById('loading').innerHTML=`<div style="padding:28px 22px;text-align:center;max-width:340px">
    <div style="font-size:2.2rem;margin-bottom:10px">❌</div>
    <div style="font-family:'Fredoka One';font-size:1.2rem;color:#FF6B6B;margin-bottom:10px">שגיאת חיבור</div>
    <div style="background:#1C1C2E;border-radius:12px;padding:12px;font-size:.74rem;color:#FF6B6B;direction:ltr;word-break:break-all;margin-bottom:14px">${e.message||e.toString()}</div>
    <div style="font-size:.78rem;color:#8888AA">קוד: <b style="color:#FFD166">${e.code||'?'}</b></div>
    <button onclick="location.reload()" style="margin-top:14px;background:#FFD166;border:none;border-radius:11px;padding:11px 26px;font-family:'Fredoka One';font-size:.95rem;cursor:pointer;color:#1A1A2E">נסה שוב</button>
  </div>`;
  show('loading');
}

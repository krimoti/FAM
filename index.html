<!DOCTYPE html>

<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ארנק המשפחה 💰</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Rubik:wght@400;500;600;700&display=swap');

:root {
–dark:#12121F; –card:#1C1C2E; –card2:#252540;
–text:#EEEEF8; –dim:#8888AA;
–yellow:#FFD166; –orange:#FF9F43; –green:#06D6A0; –red:#FF6B6B;
–c0:#FF6B9D; –c1:#C77DFF; –c2:#4CC9F0; –c3:#06D6A0; –c4:#FFD166; –c5:#FF9F43;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:‘Rubik’,sans-serif;background:var(–dark);color:var(–text);min-height:100vh;overflow-x:hidden;}

.bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg span{position:absolute;border-radius:50%;opacity:.05;animation:fl 9s ease-in-out infinite;}
.bg span:nth-child(1){width:350px;height:350px;background:#FF6B9D;top:-80px;right:-100px;}
.bg span:nth-child(2){width:250px;height:250px;background:#C77DFF;bottom:60px;left:-80px;animation-delay:3s;}
.bg span:nth-child(3){width:180px;height:180px;background:#4CC9F0;top:45%;left:45%;animation-delay:5s;}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-22px)}}

.screen{position:relative;z-index:1;min-height:100vh;display:none;flex-direction:column;}
.screen.active{display:flex;}

/* ── LOADING ── */
#loading{align-items:center;justify-content:center;gap:16px;}
.spin{width:44px;height:44px;border:3px solid rgba(255,209,102,.2);border-top-color:var(–yellow);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{color:var(–dim);font-size:.95rem;}

/* ── HOME ── */
#home{align-items:center;justify-content:flex-start;padding:50px 20px 40px;gap:10px;}
.home-logo{font-family:‘Fredoka One’;font-size:2.6rem;color:var(–yellow);text-shadow:0 0 40px rgba(255,209,102,.35);text-align:center;line-height:1.1;}
.home-sub{color:var(–dim);font-size:.9rem;text-align:center;margin-bottom:8px;}
.profiles-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:380px;margin-top:10px;}
.pcard{background:var(–card);border-radius:22px;padding:26px 14px;text-align:center;cursor:pointer;transition:transform .2s,box-shadow .2s;border:2px solid transparent;position:relative;overflow:hidden;}
.pcard:active{transform:scale(.96);}
.pcard .pe{font-size:2.8rem;display:block;margin-bottom:6px;}
.pcard .pn{font-size:1rem;font-weight:700;}
.pcard .pb{font-size:.82rem;color:var(–dim);margin-top:3px;}
.pcard .pb .bv{font-weight:700;}
.pcard.dad-card{grid-column:1/-1;padding:20px;}
.pcard.dad-card .pe{font-size:2.2rem;}

/* ── PIN ── */
#pin{align-items:center;justify-content:center;gap:22px;padding:40px 20px;}
.pin-av{font-size:4rem;}
.pin-who{font-family:‘Fredoka One’;font-size:1.7rem;text-align:center;}
.pin-dots{display:flex;gap:14px;}
.pin-dot{width:15px;height:15px;border-radius:50%;border:2px solid var(–dim);transition:all .15s;}
.pin-dot.on{background:var(–yellow);border-color:var(–yellow);transform:scale(1.25);}
.pin-err{color:var(–red);font-size:.88rem;height:18px;text-align:center;}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;max-width:270px;width:100%;}
.kk{background:var(–card);border:none;border-radius:15px;padding:17px;font-size:1.35rem;font-weight:700;color:var(–text);cursor:pointer;transition:background .12s,transform .1s;font-family:‘Rubik’;}
.kk:hover{background:var(–card2);}
.kk:active{transform:scale(.91);}
.kk.del{font-size:.95rem;color:var(–dim);}
.kk.emp{background:transparent;cursor:default;pointer-events:none;}
.btn-back{background:none;border:1px solid rgba(255,255,255,.14);color:var(–dim);padding:9px 22px;border-radius:11px;cursor:pointer;font-family:‘Rubik’;font-size:.88rem;}
.btn-back:hover{border-color:rgba(255,255,255,.35);}

/* ── CHILD VIEW ── */
#child-view{padding:0;}
.cv-header{padding:52px 20px 26px;text-align:center;position:relative;}
.cv-back{position:absolute;top:56px;left:16px;background:rgba(255,255,255,.07);border:none;border-radius:11px;padding:7px 13px;color:var(–text);cursor:pointer;font-size:.82rem;font-family:‘Rubik’;}
.cv-back:hover{background:rgba(255,255,255,.14);}
.cv-av{font-size:3.2rem;display:block;margin-bottom:4px;}
.cv-name{font-family:‘Fredoka One’;font-size:1.5rem;}
.cv-sync{font-size:.72rem;color:var(–green);margin-top:4px;display:flex;align-items:center;justify-content:center;gap:5px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(–green);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.bal-card{margin:0 18px;padding:30px 22px;border-radius:26px;background:linear-gradient(135deg,var(–card),var(–card2));text-align:center;position:relative;overflow:hidden;}
.bal-label{font-size:.88rem;color:var(–dim);margin-bottom:7px;}
.bal-amount{font-family:‘Fredoka One’;font-size:3.8rem;line-height:1;margin-bottom:6px;}
.bal-nis{font-size:2rem;}
.bal-updated{font-size:.78rem;color:var(–dim);}
.bal-emoji{font-size:1.8rem;margin-top:6px;display:block;}

.msg-box{margin:14px 18px 0;display:flex;flex-direction:column;gap:8px;}
.msg-personal,.msg-auto{border-radius:15px;padding:12px 15px;font-size:.88rem;display:flex;align-items:flex-start;gap:9px;line-height:1.45;animation:fiu .4s ease both;}
.msg-personal{background:linear-gradient(135deg,rgba(255,209,102,.13),rgba(255,159,67,.07));border:1px solid rgba(255,209,102,.28);color:var(–yellow);font-weight:600;}
.msg-auto{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);color:var(–dim);}
.msg-ic{font-size:1.05rem;flex-shrink:0;margin-top:1px;}
@keyframes fiu{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}

.hist-sec{padding:22px 18px 40px;}
.sec-ttl{font-size:.82rem;color:var(–dim);margin-bottom:12px;letter-spacing:.05em;font-weight:600;}
.tx{background:var(–card);border-radius:15px;padding:14px;margin-bottom:9px;display:flex;align-items:center;gap:12px;}
.tx-ic{font-size:1.35rem;}
.tx-body{flex:1;}
.tx-note{font-size:.92rem;font-weight:600;}
.tx-date{font-size:.75rem;color:var(–dim);margin-top:2px;}
.tx-amt{font-size:1.05rem;font-weight:700;}
.tx-amt.pos{color:var(–green);}
.tx-amt.neg{color:var(–red);}
.no-hist{color:var(–dim);font-size:.88rem;text-align:center;padding:18px;}

/* ── DAD VIEW ── */
#dad-view{padding:0;}
.dad-hdr{padding:52px 20px 20px;background:linear-gradient(180deg,rgba(255,159,67,.07) 0%,transparent 100%);}
.dad-hdr .dback{display:inline-block;background:rgba(255,255,255,.07);border:none;border-radius:11px;padding:7px 13px;color:var(–text);cursor:pointer;font-size:.82rem;font-family:‘Rubik’;margin-bottom:10px;}
.dad-hdr .dback:hover{background:rgba(255,255,255,.14);}
.dad-hdr h1{font-family:‘Fredoka One’;font-size:1.55rem;color:var(–orange);}
.dad-hdr p{font-size:.83rem;color:var(–dim);margin-top:3px;}
.dad-body{padding:14px 18px 50px;display:flex;flex-direction:column;gap:18px;}

.kid-panel{background:var(–card);border-radius:22px;overflow:hidden;}
.kph{padding:18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.06);}
.kph .ke{font-size:2rem;}
.kph .ki{flex:1;}
.kph .kn{font-weight:700;font-size:.97rem;}
.kph .kb{font-size:.8rem;color:var(–dim);margin-top:2px;}
.kph .kb .kbv{font-weight:700;}
.kactions{padding:14px;display:flex;flex-direction:column;gap:9px;}
.arow{display:flex;gap:7px;align-items:flex-end;}
.iw{flex:1;}
.iw label{display:block;font-size:.73rem;color:var(–dim);margin-bottom:4px;}
.iw input{width:100%;background:var(–dark);border:1.5px solid rgba(255,255,255,.09);border-radius:11px;padding:10px 13px;color:var(–text);font-family:‘Rubik’;font-size:.93rem;transition:border-color .2s;}
.iw input:focus{outline:none;border-color:var(–yellow);}
.btn-g,.btn-r,.btn-y,.btn-p{border:none;border-radius:11px;padding:11px 15px;font-family:‘Fredoka One’;font-size:.95rem;cursor:pointer;transition:transform .1s,box-shadow .2s;white-space:nowrap;}
.btn-g{background:var(–green);color:#0A0A1A;}
.btn-g:hover{box-shadow:0 4px 18px rgba(6,214,160,.4);}
.btn-r{background:var(–red);color:#fff;}
.btn-r:hover{box-shadow:0 4px 18px rgba(255,107,107,.4);}
.btn-y{background:var(–yellow);color:#1A1A2E;}
.btn-y:hover{box-shadow:0 4px 18px rgba(255,209,102,.4);}
.btn-p{background:#C77DFF;color:#0A0A1A;}
.btn-p:hover{box-shadow:0 4px 18px rgba(199,125,255,.4);}
.btn-g:active,.btn-r:active,.btn-y:active,.btn-p:active{transform:scale(.94);}
.divider{height:1px;background:rgba(255,255,255,.05);margin:2px 0;}
.mini-hist{padding:0 14px 14px;}
.mtx{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.83rem;}
.mtx:last-child{border:none;}
.mtx .mn{flex:1;color:var(–dim);}
.mtx .ma{font-weight:700;}
.mtx .ma.pos{color:var(–green);}
.mtx .ma.neg{color:var(–red);}
.mtx .ma.set{color:var(–yellow);}
.mtx .md{font-size:.7rem;color:rgba(255,255,255,.22);}
.add-kid-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:rgba(255,255,255,.04);border:2px dashed rgba(255,255,255,.12);border-radius:22px;padding:22px;cursor:pointer;font-size:.95rem;color:var(–dim);font-weight:600;transition:border-color .2s,color .2s;}
.add-kid-btn:hover{border-color:rgba(255,255,255,.25);color:var(–text);}

/* ── TOAST ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);background:var(–green);color:#0A0A1A;padding:11px 22px;border-radius:50px;font-weight:700;font-size:.88rem;transition:transform .32s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{background:var(–red);color:#fff;}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(–card);border-radius:28px 28px 0 0;padding:28px 22px 40px;width:100%;max-width:460px;animation:slideUp .28s cubic-bezier(.34,1.3,.64,1);max-height:88vh;overflow-y:auto;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h3{font-family:‘Fredoka One’;font-size:1.35rem;margin-bottom:18px;}
.mfield{margin-bottom:13px;}
.mfield label{display:block;font-size:.75rem;color:var(–dim);margin-bottom:4px;}
.mfield input{width:100%;background:var(–dark);border:1.5px solid rgba(255,255,255,.09);border-radius:11px;padding:11px 13px;color:var(–text);font-family:‘Rubik’;font-size:.93rem;}
.mfield input:focus{outline:none;border-color:var(–yellow);}
.mbtns{display:flex;gap:9px;margin-top:6px;}
.mbtns button{flex:1;border:none;border-radius:11px;padding:13px;font-family:‘Fredoka One’;font-size:.97rem;cursor:pointer;}
.mbtns .msave{background:var(–yellow);color:var(–dark);}
.mbtns .mcancel{background:rgba(255,255,255,.07);color:var(–text);}
.mdel{width:100%;border:none;border-radius:11px;padding:12px;background:rgba(255,107,107,.12);color:var(–red);font-family:‘Fredoka One’;font-size:.95rem;cursor:pointer;margin-top:10px;}
.mdel:hover{background:rgba(255,107,107,.22);}

.gear{position:fixed;top:16px;right:14px;z-index:200;background:rgba(255,255,255,.06);border:none;border-radius:11px;padding:9px 11px;cursor:pointer;font-size:1.05rem;transition:background .2s;}
.gear:hover{background:rgba(255,255,255,.12);}
</style>

</head>
<body>
<div class="bg"><span></span><span></span><span></span></div>
<div class="toast" id="toast"></div>

<!-- LOADING -->

<div class="screen active" id="loading">
  <div class="spin"></div>
  <div class="load-txt">מתחבר לענן...</div>
</div>

<!-- HOME -->

<div class="screen" id="home">
  <div class="home-logo">💰 ארנק המשפחה</div>
  <div class="home-sub">בחר/י את הפרופיל שלך</div>
  <div class="profiles-grid" id="pgrid"></div>
</div>

<!-- PIN -->

<div class="screen" id="pin">
  <div class="pin-av" id="pin-av"></div>
  <div class="pin-who" id="pin-who"></div>
  <div class="pin-dots">
    <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-err" id="pin-err"></div>
  <div class="keypad">
    <button class="kk" onclick="pk('1')">1</button>
    <button class="kk" onclick="pk('2')">2</button>
    <button class="kk" onclick="pk('3')">3</button>
    <button class="kk" onclick="pk('4')">4</button>
    <button class="kk" onclick="pk('5')">5</button>
    <button class="kk" onclick="pk('6')">6</button>
    <button class="kk" onclick="pk('7')">7</button>
    <button class="kk" onclick="pk('8')">8</button>
    <button class="kk" onclick="pk('9')">9</button>
    <div class="kk emp"></div>
    <button class="kk" onclick="pk('0')">0</button>
    <button class="kk del" onclick="pdel()">⌫</button>
  </div>
  <button class="btn-back" onclick="goHome()">← חזרה</button>
</div>

<!-- CHILD VIEW -->

<div class="screen" id="child-view">
  <div class="cv-header">
    <button class="cv-back" onclick="goHome()">← חזרה</button>
    <span class="cv-av" id="cv-av"></span>
    <div class="cv-name" id="cv-name"></div>
    <div class="cv-sync"><span class="sync-dot"></span> מסונכרן בזמן אמת</div>
  </div>
  <div class="bal-card" id="cv-card">
    <div class="bal-label">היתרה שלי ✨</div>
    <div class="bal-amount" id="cv-amt"></div>
    <div class="bal-updated" id="cv-upd"></div>
    <span class="bal-emoji" id="cv-em"></span>
  </div>
  <div class="msg-box" id="cv-msg" style="display:none"></div>
  <div class="hist-sec">
    <div class="sec-ttl">📋 היסטוריית תנועות</div>
    <div id="cv-hist"></div>
  </div>
</div>

<!-- DAD VIEW -->

<div class="screen" id="dad-view">
  <div class="dad-hdr">
    <button class="dback" onclick="goHome()">← חזרה</button>
    <h1>🛠️ ניהול ארנקים</h1>
    <p>עדכן יתרות • שלח הודעות • הוסף ילדים</p>
  </div>
  <div class="dad-body" id="dad-body"></div>
</div>

<!-- MODAL: EDIT/ADD KID -->

<div class="overlay" id="kid-modal">
  <div class="modal">
    <h3 id="km-title">➕ הוסף ילד/ה</h3>
    <div class="mfield"><label>שם</label><input id="km-name" placeholder="שם הילד/ה" maxlength="14"></div>
    <div class="mfield"><label>אימוג'י</label><input id="km-emoji" placeholder="👧" maxlength="4"></div>
    <div class="mfield"><label>קוד PIN (4 ספרות)</label><input id="km-pin" type="number" placeholder="1234"></div>
    <div class="mbtns">
      <button class="msave" onclick="saveKid()">שמור</button>
      <button class="mcancel" onclick="closeModal('kid-modal')">ביטול</button>
    </div>
    <button class="mdel" id="km-del" onclick="deleteKid()" style="display:none">🗑️ מחק ילד/ה זה</button>
  </div>
</div>

<!-- MODAL: DAD SETTINGS -->

<div class="overlay" id="dad-modal">
  <div class="modal">
    <h3>⚙️ הגדרות</h3>
    <div class="mfield"><label>שם</label><input id="dm-name" placeholder="אבא" maxlength="14"></div>
    <div class="mfield"><label>אימוג'י</label><input id="dm-emoji" placeholder="👨" maxlength="4"></div>
    <div class="mfield"><label>קוד PIN (4 ספרות)</label><input id="dm-pin" type="number" placeholder="0000"></div>
    <div class="mbtns">
      <button class="msave" onclick="saveDad()">שמור</button>
      <button class="mcancel" onclick="closeModal('dad-modal')">ביטול</button>
    </div>
  </div>
</div>

<button class="gear" id="gear" onclick="openDadSettings()" style="display:none">⚙️</button>

<!-- Firebase -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc,
  onSnapshot, collection, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── CONFIG ──
const firebaseConfig = {
  apiKey: "AIzaSyB6WHGPHHy6k5cTPmjdKJla8Ud9Q5d7YAY",
  authDomain: "family-9e6a3.firebaseapp.com",
  projectId: "family-9e6a3",
  storageBucket: "family-9e6a3.firebasestorage.app",
  messagingSenderId: "285640921311",
  appId: "1:285640921311:web:d7c3a3d7f111993cfa196a"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── COLORS ──
const COLORS = ['#FF6B9D','#C77DFF','#4CC9F0','#06D6A0','#FFD166','#FF9F43'];

// ── STATE ──
let D = { dad:{ name:'אבא', emoji:'👨', pin:'0000' }, kids:[] };
let pinBuf='', pinTarget=null, editKidId=null;
let childUnsub = null; // real-time listener for child view

// ══════════════════════════════════════════════════════
// FIRESTORE HELPERS
// ══════════════════════════════════════════════════════
const configRef = () => doc(db,'wallet','config');
const kidRef    = (id) => doc(db,'wallet','kids_'+id);

async function loadAll() {
  // Load config (dad settings)
  const cfgSnap = await getDoc(configRef());
  if (cfgSnap.exists()) {
    D.dad = cfgSnap.data().dad || D.dad;
    D.kids = cfgSnap.data().kids || [];
  } else {
    // First run — create defaults
    await setDoc(configRef(), { dad: D.dad, kids: D.kids });
  }
  // Load each kid's balance+history from their own doc
  for (const k of D.kids) {
    const snap = await getDoc(kidRef(k.id));
    if (snap.exists()) {
      k.balance = snap.data().balance ?? 0;
      k.history = snap.data().history ?? [];
      k.message = snap.data().message ?? '';
    } else {
      await setDoc(kidRef(k.id), { balance:0, history:[], message:'' });
    }
  }
}

async function saveConfig() {
  await setDoc(configRef(), { dad: D.dad, kids: D.kids.map(k=>({
    id:k.id, name:k.name, emoji:k.emoji, pin:k.pin, ci:k.ci
  }))});
}

async function saveKidData(kid) {
  await setDoc(kidRef(kid.id), {
    balance: kid.balance,
    history: kid.history,
    message: kid.message ?? ''
  });
}

// ══════════════════════════════════════════════════════
// SCREENS
// ══════════════════════════════════════════════════════
function show(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('gear').style.display = id==='dad-view'?'block':'none';
  if (id !== 'child-view' && childUnsub) { childUnsub(); childUnsub=null; }
}

function goHome() { show('home'); renderHome(); }

// ══════════════════════════════════════════════════════
// HOME
// ══════════════════════════════════════════════════════
function kidColor(k) { return COLORS[k.ci % COLORS.length]; }

function renderHome() {
  const g = document.getElementById('pgrid');
  g.innerHTML='';

  D.kids.forEach(k=>{
    const col = kidColor(k);
    const d = document.createElement('div');
    d.className='pcard';
    d.style.borderColor=col+'66';
    d.innerHTML=`
      <span class="pe">${k.emoji}</span>
      <div class="pn">${k.name}</div>
      <div class="pb">₪<span class="bv" style="color:${col}">${(k.balance||0).toFixed(2)}</span></div>`;
    d.addEventListener('mouseenter',()=>d.style.boxShadow=`0 8px 28px ${col}44`);
    d.addEventListener('mouseleave',()=>d.style.boxShadow='');
    d.onclick=()=>startPin({type:'kid',id:k.id});
    g.appendChild(d);
  });

  const dad = document.createElement('div');
  dad.className='pcard dad-card';
  dad.style.borderColor='rgba(255,159,67,.35)';
  dad.innerHTML=`
    <span class="pe">${D.dad.emoji}</span>
    <div class="pn">${D.dad.name}</div>
    <div class="pb" style="color:var(--dim)">ניהול ארנקים</div>`;
  dad.onclick=()=>startPin({type:'dad'});
  g.appendChild(dad);
}

// ══════════════════════════════════════════════════════
// PIN
// ══════════════════════════════════════════════════════
function startPin(target) {
  pinTarget=target; pinBuf='';
  updDots(); document.getElementById('pin-err').textContent='';
  if (target.type==='dad') {
    document.getElementById('pin-av').textContent=D.dad.emoji;
    document.getElementById('pin-who').textContent=`שלום ${D.dad.name} 👋`;
  } else {
    const k=D.kids.find(x=>x.id===target.id);
    document.getElementById('pin-av').textContent=k.emoji;
    document.getElementById('pin-who').textContent=`שלום ${k.name} 👋`;
  }
  show('pin');
}

function pk(d) {
  if(pinBuf.length>=4)return;
  pinBuf+=d; updDots();
  if(pinBuf.length===4) setTimeout(checkPin,150);
}
function pdel() { pinBuf=pinBuf.slice(0,-1); updDots(); document.getElementById('pin-err').textContent=''; }
function updDots() { for(let i=0;i<4;i++) document.getElementById('pd'+i).classList.toggle('on',i<pinBuf.length); }

function checkPin() {
  const correct = pinTarget.type==='dad' ? D.dad.pin : (D.kids.find(k=>k.id===pinTarget.id)?.pin||'');
  if(pinBuf===correct) {
    pinTarget.type==='dad' ? openDad() : openChild(pinTarget.id);
  } else {
    document.getElementById('pin-err').textContent='❌ קוד שגוי, נסה שנית';
    pinBuf=''; updDots();
    const dots=document.querySelector('.pin-dots');
    dots.style.animation='none'; dots.offsetHeight; dots.style.animation='shake .4s';
  }
}

// ══════════════════════════════════════════════════════
// CHILD VIEW — real-time listener
// ══════════════════════════════════════════════════════
function openChild(kidId) {
  const k = D.kids.find(x=>x.id===kidId);
  const col = kidColor(k);

  document.getElementById('cv-av').textContent=k.emoji;
  document.getElementById('cv-name').textContent=`היתרה של ${k.name}`;
  document.getElementById('cv-card').style.borderTop=`3px solid ${col}55`;

  renderChildData(k, col);
  show('child-view');

  // Real-time listener
  if (childUnsub) childUnsub();
  childUnsub = onSnapshot(kidRef(kidId), snap => {
    if (!snap.exists()) return;
    const data = snap.data();
    k.balance = data.balance ?? 0;
    k.history = data.history ?? [];
    k.message = data.message ?? '';
    renderChildData(k, col);
  });
}

function renderChildData(k, col) {
  const amt = document.getElementById('cv-amt');
  amt.innerHTML=`<span class="bal-nis" style="color:${col}">₪</span><span style="color:${col}">${(k.balance||0).toFixed(2)}</span>`;

  const last=k.history?.[0];
  document.getElementById('cv-upd').textContent=last?`עודכן: ${last.date}`:'טרם עודכן';

  const bals=[[0,'🤷'],[1,'🌱'],[20,'😊'],[50,'😄✨'],[100,'🎉🎊🥳'],[200,'👑'],[500,'🏆']];
  let em='😊'; for(const [t,e] of bals) if((k.balance||0)>=t) em=e;
  document.getElementById('cv-em').textContent=em;

  // Messages
  const mb=document.getElementById('cv-msg');
  const auto=autoMsg(k.balance||0, k.name);
  const personal=(k.message||'').trim();
  let mh='';
  if(personal) mh+=`<div class="msg-personal"><span class="msg-ic">💌</span><span>${personal}</span></div>`;
  if(auto) mh+=`<div class="msg-auto"><span class="msg-ic">${auto.i}</span><span>${auto.t}</span></div>`;
  mb.innerHTML=mh; mb.style.display=mh?'flex':'none';

  // History
  const h=document.getElementById('cv-hist');
  if(!(k.history||[]).length) { h.innerHTML='<div class="no-hist">אין עדיין תנועות</div>'; return; }
  h.innerHTML=k.history.slice(0,20).map(tx=>`
    <div class="tx">
      <div class="tx-ic">${tx.type==='add'?'⬆️':tx.type==='sub'?'⬇️':'📌'}</div>
      <div class="tx-body">
        <div class="tx-note">${tx.note||(tx.type==='add'?'הפקדה':tx.type==='sub'?'משיכה':'עדכון')}</div>
        <div class="tx-date">${tx.date}</div>
      </div>
      <div class="tx-amt ${tx.type==='add'?'pos':tx.type==='sub'?'neg':''}">
        ${tx.type==='add'?'+':tx.type==='sub'?'-':''}₪${Math.abs(tx.amount).toFixed(2)}
      </div>
    </div>`).join('');
}

function autoMsg(bal, name) {
  if(bal===0) return {i:'🌱',t:`${name}, הכל מתחיל בשקל הראשון! 💪`};
  if(bal<20)  return {i:'💪',t:`יש לך ₪${bal.toFixed(2)} — יפה! תמשיכי לצבור!`};
  if(bal<50)  return {i:'⭐',t:`₪${bal.toFixed(2)} — את בדרך הנכונה! עוד קצת ל-50 שקל!`};
  if(bal<100) return {i:'🚀',t:`כבר ₪${bal.toFixed(2)}! עוד קצת ל-100 שקל! 🎯`};
  if(bal<200) return {i:'🎉',t:`מאה שקל ומעלה! ₪${bal.toFixed(2)} — את גדולה!`};
  if(bal<500) return {i:'👑',t:`₪${bal.toFixed(2)} בארנק — את חוסכת כמו אלופה!`};
  return {i:'🏆',t:`₪${bal.toFixed(2)} — עצום! חסכנית אמיתית!`};
}

// ══════════════════════════════════════════════════════
// DAD VIEW
// ══════════════════════════════════════════════════════
function openDad() {
  const body=document.getElementById('dad-body');
  body.innerHTML='';

  D.kids.forEach(k=>{
    const col=kidColor(k);
    const recTx=(k.history||[]).slice(0,4).map(tx=>`
      <div class="mtx">
        <div class="mn">${tx.note||(tx.type==='add'?'הפקדה':tx.type==='sub'?'משיכה':'עדכון')}</div>
        <div class="ma ${tx.type==='add'?'pos':tx.type==='sub'?'neg':'set'}">
          ${tx.type==='add'?'+':tx.type==='sub'?'-':'='}₪${Math.abs(tx.amount).toFixed(2)}
        </div>
        <div class="md">${tx.date.split(' ')[0]}</div>
      </div>`).join('');

    const p=document.createElement('div');
    p.className='kid-panel';
    p.innerHTML=`
      <div class="kph">
        <div class="ke">${k.emoji}</div>
        <div class="ki">
          <div class="kn">${k.name}</div>
          <div class="kb">יתרה: <span class="kbv" style="color:${col}">₪${(k.balance||0).toFixed(2)}</span></div>
        </div>
        <button onclick="openEditKid('${k.id}')" style="background:rgba(255,255,255,.06);border:none;border-radius:9px;padding:7px 11px;color:var(--dim);cursor:pointer;font-size:.8rem;">✏️ ערוך</button>
      </div>
      <div class="kactions">
        <div class="arow">
          <div class="iw"><label>הערה / סיבה</label><input type="text" id="note-${k.id}" placeholder="כסף כיס, ציון טוב..." maxlength="40"></div>
        </div>
        <div class="arow">
          <div class="iw"><label>סכום ₪</label><input type="number" id="amt-${k.id}" placeholder="0.00" min="0" step="0.5"></div>
          <button class="btn-g" onclick="addM('${k.id}')">+ הפקד</button>
          <button class="btn-r" onclick="subM('${k.id}')">− הורד</button>
        </div>
        <div class="arow">
          <div class="iw"><label>קבע יתרה ישירות</label><input type="number" id="set-${k.id}" placeholder="₪ סכום חדש" min="0" step="0.5"></div>
          <button class="btn-y" onclick="setB('${k.id}')">קבע</button>
        </div>
        <div class="arow">
          <div class="iw"><label>💌 הודעה אישית לילדה</label>
            <input type="text" id="msg-${k.id}" placeholder="כל הכבוד! 💪" maxlength="80" value="${k.message||''}">
          </div>
          <button class="btn-p" onclick="saveMsg('${k.id}')">שלח</button>
        </div>
      </div>
      ${(k.history||[]).length?`
      <div class="divider"></div>
      <div class="mini-hist">
        <div class="sec-ttl">תנועות אחרונות</div>
        ${recTx}
      </div>`:''}`;
    body.appendChild(p);
  });

  const add=document.createElement('div');
  add.className='add-kid-btn';
  add.innerHTML='<span style="font-size:1.4rem">➕</span> הוסף ילד/ה חדש/ה';
  add.onclick=openAddKid;
  body.appendChild(add);

  show('dad-view');
}

function nowStr() {
  const d=new Date();
  return d.toLocaleDateString('he-IL')+' '+d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
}

async function addM(id) {
  const amt=parseFloat(document.getElementById('amt-'+id).value);
  const note=document.getElementById('note-'+id).value.trim();
  if(!amt||amt<=0){toast('הכנס סכום תקין',true);return;}
  const k=D.kids.find(x=>x.id===id);
  k.balance=Math.round(((k.balance||0)+amt)*100)/100;
  k.history=[{type:'add',amount:amt,note:note||'הפקדה',date:nowStr()},...(k.history||[])].slice(0,60);
  await saveKidData(k);
  toast(`✅ הופקדו ₪${amt.toFixed(2)} ל${k.name}`);
  document.getElementById('amt-'+id).value='';
  document.getElementById('note-'+id).value='';
  openDad();
}

async function subM(id) {
  const amt=parseFloat(document.getElementById('amt-'+id).value);
  const note=document.getElementById('note-'+id).value.trim();
  if(!amt||amt<=0){toast('הכנס סכום תקין',true);return;}
  const k=D.kids.find(x=>x.id===id);
  if(amt>(k.balance||0)){toast('יתרה לא מספיקה',true);return;}
  k.balance=Math.round(((k.balance||0)-amt)*100)/100;
  k.history=[{type:'sub',amount:amt,note:note||'משיכה',date:nowStr()},...(k.history||[])].slice(0,60);
  await saveKidData(k);
  toast(`✅ הורדו ₪${amt.toFixed(2)} מ${k.name}`);
  document.getElementById('amt-'+id).value='';
  document.getElementById('note-'+id).value='';
  openDad();
}

async function setB(id) {
  const val=parseFloat(document.getElementById('set-'+id).value);
  if(isNaN(val)||val<0){toast('הכנס יתרה תקינה',true);return;}
  const k=D.kids.find(x=>x.id===id);
  const old=k.balance||0;
  k.balance=Math.round(val*100)/100;
  k.history=[{type:'set',amount:val,note:`עדכון: ₪${old.toFixed(2)} → ₪${val.toFixed(2)}`,date:nowStr()},...(k.history||[])].slice(0,60);
  await saveKidData(k);
  toast(`✅ יתרת ${k.name} עודכנה ל-₪${val.toFixed(2)}`);
  document.getElementById('set-'+id).value='';
  openDad();
}

async function saveMsg(id) {
  const msg=document.getElementById('msg-'+id).value.trim();
  const k=D.kids.find(x=>x.id===id);
  k.message=msg;
  await saveKidData(k);
  toast(msg?`💌 הודעה נשמרה ל${k.name}`:'🗑️ הודעה נמחקה');
}

// ══════════════════════════════════════════════════════
// ADD / EDIT KID
// ══════════════════════════════════════════════════════
function openAddKid() {
  editKidId=null;
  document.getElementById('km-title').textContent='➕ הוסף ילד/ה';
  document.getElementById('km-name').value='';
  document.getElementById('km-emoji').value='';
  document.getElementById('km-pin').value='';
  document.getElementById('km-del').style.display='none';
  openModal('kid-modal');
}
function openEditKid(id) {
  editKidId=id;
  const k=D.kids.find(x=>x.id===id);
  document.getElementById('km-title').textContent=`✏️ ערוך — ${k.name}`;
  document.getElementById('km-name').value=k.name;
  document.getElementById('km-emoji').value=k.emoji;
  document.getElementById('km-pin').value=k.pin;
  document.getElementById('km-del').style.display='block';
  openModal('kid-modal');
}
async function saveKid() {
  const name=document.getElementById('km-name').value.trim();
  const emoji=document.getElementById('km-emoji').value.trim()||'👧';
  const pin=String(document.getElementById('km-pin').value).padStart(4,'0').slice(0,4);
  if(!name){toast('הכנס שם',true);return;}
  if(!/^\d{4}$/.test(pin)){toast('קוד חייב להיות 4 ספרות',true);return;}
  if(editKidId) {
    const k=D.kids.find(x=>x.id===editKidId);
    k.name=name; k.emoji=emoji; k.pin=pin;
    toast(`✅ ${name} עודכן/ה`);
  } else {
    const id='k'+Date.now();
    const ci=D.kids.length%COLORS.length;
    D.kids.push({id,name,emoji,pin,ci,balance:0,history:[],message:''});
    await saveKidData(D.kids[D.kids.length-1]);
    toast(`✅ ${name} נוסף/ה!`);
  }
  await saveConfig();
  closeModal('kid-modal'); openDad();
}
async function deleteKid() {
  if(!editKidId)return;
  const k=D.kids.find(x=>x.id===editKidId);
  if(!confirm(`למחוק את ${k.name}? כל הנתונים יאבדו.`))return;
  D.kids=D.kids.filter(x=>x.id!==editKidId);
  await saveConfig();
  toast(`🗑️ ${k.name} נמחק/ה`);
  closeModal('kid-modal'); openDad();
}

// ══════════════════════════════════════════════════════
// DAD SETTINGS
// ══════════════════════════════════════════════════════
function openDadSettings() {
  document.getElementById('dm-name').value=D.dad.name;
  document.getElementById('dm-emoji').value=D.dad.emoji;
  document.getElementById('dm-pin').value=D.dad.pin;
  openModal('dad-modal');
}
async function saveDad() {
  const name=document.getElementById('dm-name').value.trim()||'אבא';
  const emoji=document.getElementById('dm-emoji').value.trim()||'👨';
  const pin=String(document.getElementById('dm-pin').value).padStart(4,'0').slice(0,4);
  if(!/^\d{4}$/.test(pin)){toast('קוד חייב להיות 4 ספרות',true);return;}
  D.dad={name,emoji,pin};
  await saveConfig();
  closeModal('dad-modal'); toast('✅ הגדרות נשמרו'); openDad();
}

// ══════════════════════════════════════════════════════
// MODAL / TOAST
// ══════════════════════════════════════════════════════
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('open'); });
});

function toast(msg,err=false) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(err?' err':'');
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600);
}

// ══════════════════════════════════════════════════════
// SHAKE + EXPOSE GLOBALS
// ══════════════════════════════════════════════════════
const s=document.createElement('style');
s.textContent=`@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}`;
document.head.appendChild(s);

// Expose to inline onclick handlers
Object.assign(window,{
  pk, pdel, goHome,
  openEditKid, openAddKid, saveKid, deleteKid,
  openDadSettings, saveDad,
  addM, subM, setB, saveMsg,
  openModal, closeModal
});

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
try {
  await loadAll();
  show('home');
  renderHome();
} catch(e) {
  console.error(e);
  document.querySelector('#loading .load-txt').textContent='שגיאת חיבור — בדוק חיבור אינטרנט';
}
</script>
